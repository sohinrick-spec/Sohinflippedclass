              />
            ) : (
              <div className="glass-panel p-8 rounded-2xl shadow-xl text-center max-w-sm">
                <i className="fas fa-lock text-4xl text-red-500 mb-4"></i>
                <h2 className="text-xl font-bold text-gray-800 dark:text-gray-100 mb-2">權限不足</h2>
                <p className="text-gray-500 dark:text-gray-400 mb-4 text-sm">此頁面僅限教師使用。</p>
                <button onClick={() => setScreen('home')} className="bg-gray-600 text-white px-6 py-2 rounded-lg">返回</button>
              </div>
            )}
          </motion.div>
        )}

      </AnimatePresence>
    </div>
  );
}

/* ============================================================================
 * 【區塊 13A】ASSIGNMENT ADMIN SCREEN (發佈新影片任務與狀態管理)
 * ============================================================================ */
function AssignmentAdminScreen({ userName, onBack, refetchLessons, lessons = [], allProgress = {} }) {
  const toast = useToast();
  const [activeTab, setActiveTab] = React.useState('create'); // 'create': 發佈任務, 'status': 查看完成情況
  const [creating, setCreating] = React.useState(false);
  const [topic, setTopic] = React.useState('必修部分');
  const [title, setTitle] = React.useState('');
  const [description, setDescription] = React.useState('');
  const [videoId, setVideoId] = React.useState('');
  const [dueDate, setDueDate] = React.useState('');
  const [estimatedMin, setEstimatedMin] = React.useState(10);
  const [targetForm, setTargetForm] = React.useState('All');

  // 下拉選單控制狀態：儲存選中的索引或 'custom'
  const [videoSelection, setVideoSelection] = React.useState('');

  // 💡 自動從現有的 lessons 列表中提取所有不重複的影片庫，供下拉選單直接選擇 title
  const uniqueVideos = React.useMemo(() => {
    const seen = new Set();
    const list = [];
    if (Array.isArray(lessons)) {
      lessons.forEach(l => {
        if (l.videoId && !seen.has(l.videoId)) {
          seen.add(l.videoId);
          list.push({
            videoId: l.videoId,
            title: l.title,
            topic: l.topic || '必修部分'
          });
        }
      });
    }
    return list;
  }, [lessons]);

  // 📊 計算已派發任務的學生觀看與完成進度統計
  const lessonStats = React.useMemo(() => {
    if (!Array.isArray(lessons)) return [];
    // 按時間倒序排列，讓最新派發的任務顯示在最上方
    return [...lessons].reverse().map(l => {
      const progressMap = allProgress[l.id] || {};
      const studentRecords = Object.entries(progressMap);
      
      // 已開始觀看人數
      const startedCount = studentRecords.filter(([,p]) => (p.watchPct || 0) > 0).length;
      // 已完成人數
      const completedCount = studentRecords.filter(([,p]) => p.completedAt || (p.watchPct >= 90)).length;

      // 從全域進度推算「同班同學」（曾登入過的）
      const allKnown = new Set();
      Object.values(allProgress || {}).forEach(lp => Object.keys(lp).forEach(n => allKnown.add(n)));
      const classmates = [...allKnown].filter(name => matchesTargetForm(l.targetForm, parseUserForm(name)));
      const notStarted = classmates.filter(name => !progressMap[name]);

      return {
        lesson: l,
        started: startedCount,
        completed: completedCount,
        progressMap,
        classmates,
        notStarted
      };
    });
  }, [lessons, allProgress]);

  // 處理選單選取影片事件
  const handleVideoSelectChange = (e) => {
    const val = e.target.value;
    setVideoSelection(val);
    
    if (val === 'custom') {
      // 選擇自訂輸入，清空欄位讓老師自行填寫
      setVideoId('');
      setTitle('');
    } else if (val !== '') {
      // 選擇現有影片，自動填入對應欄位
      const idx = Number(val);
      const selectedVideo = uniqueVideos[idx];
      if (selectedVideo) {
        setVideoId(selectedVideo.videoId);
        setTitle(selectedVideo.title);
        setTopic(selectedVideo.topic);
      }
    } else {
      setVideoId('');
      setTitle('');
    }
  };

  const handleCreate = async () => {
    if (!title.trim()) return toast('請輸入或選擇任務標題', 'warning');
    if (!videoId.trim()) return toast('請輸入或選擇影片 ID', 'warning');

    setCreating(true);
    const lessonId = `lesson_${Date.now()}`;
    const payload = {
      action: 'createLesson',
      lesson: {
        id: lessonId,
        topic,
        title: title.trim(),
        description: description.trim(),
        videoId: videoId.trim(),
        dueDate,
        estimatedMin: Number(estimatedMin),
        targetForm: targetForm.trim() || 'All'
      },
      createdBy: userName
    };

    try {
      const res = await fetch(CONFIG.GOOGLE_SCRIPT_URL, {
        method: 'POST',
        redirect: 'follow',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });

      let data = {};
      try {
        const text = await res.text();
        // GAS 有時會回傳 HTML 錯誤頁，要先嘗試 parse JSON
        data = JSON.parse(text);
      } catch {
        // 若無法 parse，視為成功（GAS 有時不回傳 JSON）
        data = { success: true };
      }

      if (data.success || data.result === 'success' || data.message) {
        toast('🎉 影片任務發佈成功！正在重新整理…', 'success');
        setTitle('');
        setDescription('');
        setVideoId('');
        setVideoSelection('');
        setDueDate('');
        setEstimatedMin(10);
        setTargetForm('All');
        setTimeout(() => { if (refetchLessons) refetchLessons(); }, 1200);
      } else {
        toast(`發佈失敗: ${data.error || JSON.stringify(data)}`, 'error');
      }
    } catch (e) {
      toast(`網絡錯誤，請檢查連線: ${e.message}`, 'error');
    } finally {
      setCreating(false);
    }
  };

  return (
    <div className="w-full max-w-xl">
      <div className="glass-panel p-4 md:p-6 rounded-2xl shadow-xl max-h-[92vh] overflow-y-auto custom-scrollbar">
        {/* 頂部導覽列 */}
        <div className="flex items-center gap-3 mb-4">
          <button onClick={onBack} className="w-9 h-9 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
            <i className="fas fa-arrow-left"></i>
          </button>
          <h2 className="text-xl font-bold text-gray-800 dark:text-gray-100">
            <i className="fas fa-chalkboard-teacher text-indigo-500 mr-2"></i>任務管理中心
          </h2>
        </div>

        {/* 📑 功能頁籤：切換「發佈任務」與「完成情況」 */}
        <div className="flex bg-gray-100 dark:bg-gray-700 p-1 rounded-xl mb-5">
          <button 
            onClick={() => setActiveTab('create')}
            className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${activeTab === 'create' ? 'bg-white dark:bg-gray-600 text-indigo-600 dark:text-indigo-300 shadow-sm' : 'text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200'}`}
          >
            <i className="fas fa-plus-circle mr-1"></i>發佈新任務
          </button>
          <button 
            onClick={() => setActiveTab('status')}
            className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${activeTab === 'status' ? 'bg-white dark:bg-gray-600 text-indigo-600 dark:text-indigo-300 shadow-sm' : 'text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200'}`}
          >
            <i className="fas fa-chart-pie mr-1"></i>已派發任務 ({lessonStats.length})
          </button>
        </div>

        {activeTab === 'create' ? (
          /* 表單視窗：發佈新任務 */
          <div className="space-y-4">
            <div>
              <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">選擇教學影片 (Title)</label>
              <select 
                value={videoSelection} 
                onChange={handleVideoSelectChange}
                className="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100 font-medium text-sm"
              >
                <option value="">-- 請選擇影片 --</option>
                {uniqueVideos.map((vid, idx) => (
                  <option key={idx} value={idx}>
                    {vid.title}
                  </option>
                ))}
                <option value="custom">➕ 手動輸入全新 YouTube 影片...</option>
              </select>
            </div>

            {/* 如果選擇自訂影片，或是目前還沒有任何現成影片，則顯示手動填寫 ID 的輸入框 */}
            {(videoSelection === 'custom' || uniqueVideos.length === 0) && (
              <div className="p-3 bg-gray-50 dark:bg-gray-900/50 rounded-xl border border-gray-200 dark:border-gray-700 transition-all">
                <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">YouTube 影片 ID</label>
                <input 
                  type="text" 
                  value={videoId} 
                  onChange={e => setVideoId(e.target.value)} 
                  placeholder="例如：dQw4w9WgXcQ" 
                  className="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100" 
                />
              </div>
            )}

            <div>
              <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">任務標題 (Title)</label>
              <input 
                type="text" 
                value={title} 
                onChange={e => setTitle(e.target.value)} 
                placeholder="選取影片後會自動填入，亦可自行修改" 
                className="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100" 
              />
            </div>

            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">單元主題 (Topic)</label>
                <select value={topic} onChange={e => setTopic(e.target.value)} className="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100">
                  <option value="必修部分">必修部分</option>
                  <option value="E1 人體生理學">E1 人體生理學</option>
                  <option value="E2 生態學">E2 生態學</option>
                  <option value="E3 微生物與生物技術">E3 微生物與生物技術</option>
                  <option value="E4 生物技術導論">E4 生物技術導論</option>
                </select>
              </div>
              <div>
                <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">預計時長 (分鐘)</label>
                <input type="number" value={estimatedMin} onChange={e => setEstimatedMin(e.target.value)} className="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100" />
              </div>
            </div>

            <div>
              <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">任務說明 (Description)</label>
              <textarea value={description} onChange={e => setDescription(e.target.value)} placeholder="請同學注意觀看重點..." className="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100 h-20 resize-none" />
            </div>

            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">派發班級</label>
                <select value={targetForm} onChange={e => setTargetForm(e.target.value)} className="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100 text-sm">
                  <option value="All">全體 (All)</option>
                  <optgroup label="中四">
                    <option value="4">中四全年級</option>
                    <option value="4A">4A</option>
                    <option value="4B">4B</option>
                    <option value="4C">4C</option>
                    <option value="4D">4D</option>
                    <option value="4E">4E</option>
                  </optgroup>
                  <optgroup label="中五">
                    <option value="5">中五全年級</option>
                    <option value="5A">5A</option>
                    <option value="5B">5B</option>
                    <option value="5C">5C</option>
                    <option value="5D">5D</option>
                    <option value="5E">5E</option>
                  </optgroup>
                  <optgroup label="中六">
                    <option value="6">中六全年級</option>
                    <option value="6A">6A</option>
                    <option value="6B">6B</option>
                    <option value="6C">6C</option>
                    <option value="6D">6D</option>
                    <option value="6E">6E</option>
                  </optgroup>
                </select>
              </div>
              <div>
                <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">截止日期</label>
                <input type="date" value={dueDate} onChange={e => setDueDate(e.target.value)} className="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100" />
              </div>
            </div>
            
            <div className="pt-4 border-t border-gray-100 dark:border-gray-700">
              <button onClick={handleCreate} disabled={creating} className={`w-full py-3 rounded-xl font-bold text-white shadow-lg transition-all flex items-center justify-center gap-2 ${creating ? 'bg-gray-400' : 'bg-gradient-to-r from-indigo-500 to-purple-600 hover:scale-[1.02]'}`}>
                {creating ? <><i className="fas fa-spinner fa-spin"></i> 發佈中...</> : <><i className="fas fa-paper-plane"></i> 確認發佈任務</>}
              </button>
            </div>
          </div>
        ) : (
          /* ✨ 已派發任務：詳細學生追蹤 */
          <div className="space-y-4">
            {lessonStats.length === 0 ? (
              <div className="text-center py-12 text-gray-400 dark:text-gray-500">
                <i className="fas fa-inbox text-4xl mb-2 block opacity-40"></i>
                <span>目前系統內尚無已發佈的任務資料</span>
              </div>
            ) : (
              lessonStats.map(({ lesson, started, completed, progressMap, classmates, notStarted }) => {
                const [expanded, setExpanded] = React.useState(false);
                const totalQ = lesson.questions?.length || 0;
                const studentList = Object.entries(progressMap)
                  .map(([name, p]) => ({ name, ...p }))
                  .sort((a,b) => (b.watchPct||0) - (a.watchPct||0));

                return (
                  <div key={lesson.id} className="rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 shadow-sm overflow-hidden">
                    
                    {/* 任務標題行 */}
                    <div className="p-4">
                      <div className="flex justify-between items-start gap-2 mb-2">
                        <div className="min-w-0">
                          <span className="text-[10px] bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-300 px-2 py-0.5 rounded-full font-bold">
                            {lesson.topic}
                          </span>
                          {lesson.targetForm && lesson.targetForm !== 'All' && (
                            <span className="ml-1 text-[10px] bg-amber-100 dark:bg-amber-900/50 text-amber-700 dark:text-amber-300 px-2 py-0.5 rounded-full font-bold">
                              <i className="fas fa-users mr-0.5"></i>{lesson.targetForm}
                            </span>
                          )}
                          <h3 className="font-bold text-gray-800 dark:text-gray-100 mt-1 text-sm line-clamp-1">{lesson.title}</h3>
                        </div>
                        {lesson.dueDate && (
                          <span className="text-xs text-gray-400 dark:text-gray-500 flex-shrink-0 bg-gray-50 dark:bg-gray-900 px-2 py-1 rounded-md border border-gray-100 dark:border-gray-800">
                            截止: {lesson.dueDate}
                          </span>
                        )}
                      </div>

                      {/* 統計概覽 */}
                      <div className="grid grid-cols-3 gap-2 mb-2">
                        <div className="bg-blue-50 dark:bg-blue-900/20 rounded-lg p-2 text-center">
                          <div className="text-[10px] text-blue-500 dark:text-blue-400 font-medium"><i className="fas fa-play-circle mr-0.5"></i>已點開</div>
                          <div className="text-base font-extrabold text-blue-600 dark:text-blue-400">{started}</div>
                        </div>
                        <div className="bg-green-50 dark:bg-green-900/20 rounded-lg p-2 text-center">
                          <div className="text-[10px] text-green-500 dark:text-green-400 font-medium"><i className="fas fa-check-circle mr-0.5"></i>已完成</div>
                          <div className="text-base font-extrabold text-green-600 dark:text-green-400">{completed}</div>
                        </div>
                        <div className="bg-red-50 dark:bg-red-900/20 rounded-lg p-2 text-center">
                          <div className="text-[10px] text-red-500 dark:text-red-400 font-medium"><i className="fas fa-eye-slash mr-0.5"></i>未點開</div>
                          <div className="text-base font-extrabold text-red-500 dark:text-red-400">{notStarted.length}</div>
                        </div>
                      </div>

                      {/* 展開詳細追蹤按鈕 */}
                      <button
                        onClick={() => setExpanded(e => !e)}
                        className="w-full text-xs py-1.5 rounded-lg bg-gray-50 dark:bg-gray-700 text-gray-500 dark:text-gray-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 hover:text-indigo-600 dark:hover:text-indigo-300 transition-all font-bold flex items-center justify-center gap-1"
                      >
                        <i className={`fas fa-chevron-${expanded ? 'up' : 'down'} text-[10px]`}></i>
                        {expanded ? '收起詳情' : `查看詳細學生追蹤 (${studentList.length + notStarted.length} 人)`}
                      </button>
                    </div>

                    {/* 詳細學生列表（可展開） */}
                    {expanded && (
                      <div className="border-t border-gray-100 dark:border-gray-700 divide-y divide-gray-50 dark:divide-gray-700/50">
                        
                        {/* 已開始的學生 */}
                        {studentList.length > 0 && (
                          <div className="p-3">
                            <p className="text-[11px] font-bold text-gray-400 dark:text-gray-500 mb-2 flex items-center gap-1">
                              <i className="fas fa-play-circle text-blue-400"></i>已點開 / 進行中 ({studentList.length})
                            </p>
                            <div className="space-y-1.5">
                              {studentList.map(s => {
                                const answered = s.answers ? Object.keys(s.answers).length : 0;
                                const statusIcon = s.completedAt ? '✅' : s.watchPct >= 80 ? '▶️' : '👁️';
                                const statusColor = s.completedAt
                                  ? 'border-green-200 dark:border-green-800 bg-green-50/50 dark:bg-green-900/10'
                                  : 'border-gray-100 dark:border-gray-700/50 bg-white dark:bg-gray-800/50';
                                return (
                                  <div key={s.name} className={`rounded-lg border px-3 py-2 ${statusColor}`}>
                                    <div className="flex items-center gap-2">
                                      <span className="text-sm">{statusIcon}</span>
                                      <span className="text-xs font-bold text-gray-700 dark:text-gray-200 flex-1 truncate">
                                        {shortenName(s.name)}
                                      </span>
                                      <div className="flex items-center gap-1.5 flex-shrink-0">
                                        {/* 觀看進度條 */}
                                        <div className="w-16 h-1.5 bg-gray-200 dark:bg-gray-600 rounded-full overflow-hidden">
                                          <div className={`h-full rounded-full ${watchPctBg(s.watchPct)}`} style={{ width: fmtPct(s.watchPct) }} />
                                        </div>
                                        <span className={`text-[10px] font-bold w-8 text-right ${watchPctColor(s.watchPct)}`}>
                                          {fmtPct(s.watchPct)}
                                        </span>
                                        {totalQ > 0 && (
                                          <span className={`text-[10px] px-1.5 py-0.5 rounded font-bold ${answered >= totalQ ? 'bg-green-100 dark:bg-green-900/50 text-green-700 dark:text-green-300' : 'bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400'}`}>
                                            題{answered}/{totalQ}
                                          </span>
                                        )}
                                      </div>
                                    </div>
                                    {s.startedAt && (
                                      <div className="text-[10px] text-gray-400 dark:text-gray-500 mt-0.5 pl-6">
                                        開始: {new Date(s.startedAt).toLocaleString('zh-HK', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' })}
                                        {s.completedAt && <span className="ml-2 text-green-500 dark:text-green-400 font-bold">· 完成: {new Date(s.completedAt).toLocaleString('zh-HK', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' })}</span>}
                                      </div>
                                    )}
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        )}

                        {/* 未開始的學生 */}
                        {notStarted.length > 0 && (
                          <div className="p-3 bg-red-50/30 dark:bg-red-900/10">
                            <p className="text-[11px] font-bold text-red-400 dark:text-red-500 mb-2 flex items-center gap-1">
                              <i className="fas fa-eye-slash text-red-400"></i>未點開 ({notStarted.length})
                            </p>
                            <div className="flex flex-wrap gap-1.5">
                              {notStarted.map(name => (
                                <span key={name} className="text-[11px] bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 px-2 py-0.5 rounded-full font-medium border border-red-200 dark:border-red-800/50">
                                  {shortenName(name)}
                                </span>
                              ))}
                            </div>
                            <p className="text-[10px] text-gray-400 dark:text-gray-500 mt-2 italic">
                              * 只顯示曾使用過系統的同班同學，未登入的學生不在此列
                            </p>
                          </div>
                        )}

                        {studentList.length === 0 && notStarted.length === 0 && (
                          <div className="p-4 text-center text-xs text-gray-400 dark:text-gray-500">
                            <i className="fas fa-hourglass-half mr-1"></i>尚未有學生開始此任務
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })
            )}
          </div>
        )}
      </div>
    </div>
  );
}

/* ============================================================================
 * 【區塊 14】ROOT RENDER 
 * ============================================================================ */
function Root() {
  return (
    <ToastProvider>
      <FlippedClassroomApp />
    </ToastProvider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Root />);

</script>
</body>
</html>
