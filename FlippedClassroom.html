function getHKDateString(dateObj) {
  const base = dateObj || new Date();
  const utc  = base.getTime() + base.getTimezoneOffset() * 60000;
  const hk   = new Date(utc + 3600000 * 8);
  const y = hk.getFullYear();
  const m = String(hk.getMonth() + 1).padStart(2,'0');
  const d = String(hk.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

function getHKHour() {
  const utc = Date.now() + new Date().getTimezoneOffset() * 60000;
  return new Date(utc + 3600000 * 8).getHours();
}

function getGreeting() {
  const h = getHKHour();
  if (h < 6)  return { text: '夜深了', emoji: '🌙' };
  if (h < 12) return { text: '早晨', emoji: '☀️' };
  if (h < 14) return { text: '午安', emoji: '🌤️' };
  if (h < 18) return { text: '下午好', emoji: '🌞' };
  if (h < 22) return { text: '晚上好', emoji: '🌆' };
  return { text: '夜安', emoji: '🌙' };
}

function isDueSoon(dateStr) {
  if (!dateStr) return false;
  const today = new Date(getHKDateString());
  const due   = new Date(dateStr);
  const diff  = Math.round((due - today) / (1000 * 60 * 60 * 24));
  return diff >= 0 && diff <= 3;
}

function isOverdue(dateStr) {
  if (!dateStr) return false;
  return getHKDateString() > dateStr;
}

function daysUntilDue(dateStr) {
  if (!dateStr) return null;
  const today = new Date(getHKDateString());
  const due   = new Date(dateStr);
  return Math.round((due - today) / (1000 * 60 * 60 * 24));
}

function parseUsername(fullName) {
  if (!fullName) return { displayName: '', form: null, grade: null, number: null };
  const s = String(fullName).trim();
  const m1 = s.match(/^(.+?)\s*\(\d{2}-\d{2}\)\s*([4-6][A-Z])(\d+)\s*$/i);
  if (m1) {
    return { displayName: m1[1].trim(), form: m1[2].toUpperCase(), grade: m1[2][0], number: m1[3] };
  }
  const m2 = s.match(/^([4-6][A-Z])(\d+)\s+(.+?)\s*(?:\(\d{2}-\d{2}\))?\s*$/i);
  if (m2) {
    return { displayName: m2[3].trim(), form: m2[1].toUpperCase(), grade: m2[1][0], number: m2[2] };
  }
  // 額外支援：名稱後只有班別
const m3 = s.match(/^(.+?)\s*\(([4-6][A-Z]\d+)\)\s*$/i);

if (m3) {
  const classInfo = m3[2].toUpperCase();

  return {
    displayName: m3[1].trim(),
    form: classInfo.slice(0, 2),
    grade: classInfo[0],
    number: classInfo.slice(2)
  };
}
  return { displayName: s, form: null, grade: null, number: null };
  
}

function shortenName(fullName) {
  if (!fullName) return '';
  const parsed = parseUsername(String(fullName));
  return parsed.displayName || String(fullName).trim();
}

function getInitials(fullName) {
  const name = shortenName(fullName);
  if (!name) return '?';
  const parts = name.split(/\s+/).filter(Boolean);
  if (parts.length === 0) return '?';
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
}

function parseUserForm(fullName) {
  return parseUsername(fullName).form;
}

function matchesTargetForm(targetForm, userForm) {
  if (!targetForm || targetForm.trim() === '' || targetForm.trim().toUpperCase() === 'ALL') return true;
  if (!userForm) return false;
  const tf = targetForm.trim().toUpperCase();
  const uf = userForm.trim().toUpperCase();
  if (tf === uf) return true;
  const gm = tf.match(/^(?:[F中]?)([4-6])$/i);
  if (gm && uf[0] === gm[1]) return true;
  if (tf.includes(',')) {
    return tf.split(',').map(x => x.trim()).some(t => t === uf);
  }
  return false;
}

function normalizeNameForMatch(name) {
  if (!name) return '';
  return shortenName(name).toLowerCase().trim().split(/\s+/).filter(Boolean).sort().join(' ');
}

const TEACHER_NORMALIZED_SET = new Set(CONFIG.TEACHER_NAMES.map(normalizeNameForMatch));

function isTeacher(name) {
  if (!name || name === '訪客 (未登入)') return false;
  const n = normalizeNameForMatch(name);
  return !!n && TEACHER_NORMALIZED_SET.has(n);
}

/* ★★★ 修復 5：判斷課題是否為「已派發任務」 ★★★ */
function isAssignedLesson(lesson) {
  if (!lesson) return false;
  // 規則 1：有截止日期
  if (lesson.dueDate && String(lesson.dueDate).trim() !== '') return true;
  // 規則 2：ID 以 lesson_ 開頭（透過後台建立）
  if (lesson.id && String(lesson.id).startsWith('lesson_')) return true;
  return false;
}

/* 判斷對「該名學生」是否為派發中的有效任務（會記錄進度） */
function isAssignmentForUser(lesson, userName) {
  if (!lesson || !userName || userName === '訪客 (未登入)') return false;
  if (isTeacher(userName) && !window.__PREVIEW_STUDENT_MODE__) return false; // 教師預覽不計算進度
  if (!isAssignedLesson(lesson)) return false;
  // 是否屬於該學生班別
  return matchesTargetForm(lesson.targetForm, parseUserForm(userName));
}

function decodeJwtResponse(token) {
  const base64 = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
  return JSON.parse(decodeURIComponent(
    atob(base64).split('').map(c => '%' + ('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')
  ));
}

function loadYouTubeAPI() {
  return new Promise(resolve => {
    if (window.YT && window.YT.Player) { resolve(window.YT); return; }
    const prev = window.onYouTubeIframeAPIReady;
    window.onYouTubeIframeAPIReady = () => {
      if (prev) prev();
      resolve(window.YT);
    };
    if (!document.querySelector('script[src*="youtube.com/iframe_api"]')) {
      const s = document.createElement('script');
      s.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(s);
    }
  });
}

function loadLocalProgress(lessonId, studentName) {
  if (!lessonId || !studentName || studentName === '訪客 (未登入)') return null;
  try {
    const key = CONFIG.STORAGE.progress + lessonId + '_' + studentName;
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function saveLocalProgress(lessonId, studentName, data) {
  if (!lessonId || !studentName || studentName === '訪客 (未登入)') return;
  try {
    const key = CONFIG.STORAGE.progress + lessonId + '_' + studentName;
    localStorage.setItem(key, JSON.stringify({ ...data, savedAt: new Date().toISOString() }));
  } catch { /* ignore quota errors */ }
}

/* ★★★ 修復 1：用戶登入後寫入 Sheet（Users 工作表） ★★★ */
function registerUserOnLogin(userName) {
  if (!userName || userName === '訪客 (未登入)') return;
  if (!isScriptConfigured()) return;

  const cacheKey = CONFIG.STORAGE.registered + userName;
  // 24 小時內已註冊過則跳過
  try {
    const last = localStorage.getItem(cacheKey);
    if (last && (Date.now() - Number(last)) < 24 * 3600 * 1000) return;
  } catch {}

  fetch(CONFIG.GOOGLE_SCRIPT_URL, {
    method: 'POST',
    redirect: 'follow',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({
      action: 'registerUser',
      userName: userName,
      form: parseUserForm(userName) || '',
      loginAt: new Date().toISOString()
    })
  }).then(() => {
    try { localStorage.setItem(cacheKey, String(Date.now())); } catch {}
  }).catch(() => { /* silent */ });
}

/* ============================================================================
 * 【區塊 4】TOAST SYSTEM
 * ============================================================================ */
const TOAST_STYLE = {
  info:    { bg:'bg-indigo-500', border:'border-indigo-600', icon:'fa-circle-info' },
  success: { bg:'bg-green-500',  border:'border-green-600',  icon:'fa-circle-check' },
  warning: { bg:'bg-amber-500',  border:'border-amber-600',  icon:'fa-triangle-exclamation' },
  error:   { bg:'bg-red-500',    border:'border-red-600',    icon:'fa-circle-xmark' }
};

const ToastContext = createContext(null);

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const addToast = useCallback((message, type = 'info', duration = 3000) => {
    const id = Date.now() + Math.random();
    setToasts(prev => [...prev.slice(-4), { id, message, type, duration }]);
    if (duration > 0) setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), duration);
  }, []);
  return (
    <ToastContext.Provider value={addToast}>
      {children}
      <div className="fixed top-16 right-4 z-[9999] flex flex-col gap-2 pointer-events-none" style={{ maxWidth: '320px' }}>
        <AnimatePresence>
          {toasts.map(t => {
            const s = TOAST_STYLE[t.type] || TOAST_STYLE.info;
            return (
              <motion.div key={t.id}
                initial={{ opacity:0, x:60, scale:0.9 }}
                animate={{ opacity:1, x:0,  scale:1 }}
                exit={{   opacity:0, x:60,  scale:0.9 }}
                className={`${s.bg} ${s.border} border-l-4 text-white px-4 py-3 rounded-xl shadow-2xl pointer-events-auto flex items-center gap-2 text-sm`}>
                <i className={`fas ${s.icon} flex-shrink-0`}></i>
                <span>{t.message}</span>
              </motion.div>
            );
          })}
        </AnimatePresence>
      </div>
    </ToastContext.Provider>
  );
}

function useToast() { return useContext(ToastContext); }

/* ============================================================================
 * 【區塊 5】GOOGLE SIGN-IN HOOK
 * ============================================================================ */
function useGoogleSignIn(userName, setUserName, enabled = true) {
  const attemptRef = useRef(0);
  useEffect(() => {
    if (!enabled) return;
    if (userName) { document.body.classList.add('logged-in'); return; }
    document.body.classList.remove('logged-in');
    const maxAttempts = 60;
    let timer = null;
    function tryRender() {
      attemptRef.current++;
      if (!window.google || !window.google.accounts || !window.google.accounts.id) {
        if (attemptRef.current < maxAttempts) timer = setTimeout(tryRender, 300);
        return;
      }
      const el = document.getElementById('googleSignInDiv');
      if (!el) { if (attemptRef.current < maxAttempts) timer = setTimeout(tryRender, 300); return; }
      try {
        window.google.accounts.id.initialize({
          client_id: CONFIG.GOOGLE_CLIENT_ID,
          callback: (response) => {
            try {
              const payload = decodeJwtResponse(response.credential);
              const email   = payload.email || '';
              const name    = payload.name  || email;
              if (!CONFIG.ALLOWED_EMAIL_DOMAIN || email.endsWith(CONFIG.ALLOWED_EMAIL_DOMAIN)) {
                setUserName(name);
                localStorage.setItem(CONFIG.STORAGE.username, name);
                /* ★ 修復 1：登入即寫入 Sheet */
                registerUserOnLogin(name);
              } else {
                alert(`請使用學校電郵 (${CONFIG.ALLOWED_EMAIL_DOMAIN}) 登入`);
              }
            } catch { alert('登入失敗，請重試'); }
          }
        });
        window.google.accounts.id.renderButton(el, { theme:'outline', size:'large', width: 300 });
      } catch { /* ignore */ }
    }
    timer = setTimeout(tryRender, 300);
    return () => { if (timer) clearTimeout(timer); };
  }, [userName, setUserName, enabled]);
}

/* ============================================================================
 * 【區塊 6A】useLessons
 * ============================================================================ */
function useLessons() {
  const [lessons, setLessons]     = useState([]);
  const [loading, setLoading]     = useState(true);
  const [error,   setError]       = useState(null);

  const fetchLessons = useCallback(async () => {
    setLoading(true);
    setError(null);

    if (!isScriptConfigured()) {
      setLessons(DUMMY_LESSONS);
      setError(null);
      setLoading(false);
      return;
    }

    try {
      const res  = await fetch(
        `${CONFIG.GOOGLE_SCRIPT_URL}?action=getLessons&t=${Date.now()}`
      );
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      if (data.error) throw new Error(data.error);
      const fetched = Array.isArray(data.lessons) ? data.lessons : [];
      setLessons(fetched.length > 0 ? fetched : DUMMY_LESSONS);
    } catch (e) {
      setLessons(DUMMY_LESSONS);
      setError(`⚠️ 無法連接 Google Sheet，目前顯示示範數據。(${e.message})`);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { fetchLessons(); }, [fetchLessons]);

  return { lessons, loading, error, refetchLessons: fetchLessons };
}

/* ============================================================================
 * 【★ 新增】useRegisteredUsers — 取得所有曾登入用戶
 * ============================================================================ */
function useRegisteredUsers(userName) {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(false);

  const fetchUsers = useCallback(async () => {
    if (!userName || !isTeacher(userName)) {
      setUsers([]);
      return;
    }
    setLoading(true);

    if (!isScriptConfigured()) {
      setUsers(DUMMY_REGISTERED_USERS);
      setLoading(false);
      return;
    }

    try {
      const res = await fetch(`${CONFIG.GOOGLE_SCRIPT_URL}?action=getUsers&t=${Date.now()}`);
      if (res.ok) {
        const data = await res.json();
        if (Array.isArray(data.users) && data.users.length > 0) {
          setUsers(data.users.map(u => typeof u === 'string' ? u : (u.userName || u.name || '')).filter(Boolean));
        } else {
          setUsers(DUMMY_REGISTERED_USERS);
        }
      }
    } catch {
      setUsers(DUMMY_REGISTERED_USERS);
    } finally {
      setLoading(false);
    }
  }, [userName]);

  useEffect(() => { fetchUsers(); }, [fetchUsers]);

  return { users, loading, refetchUsers: fetchUsers };
}

/* ============================================================================
 * 【區塊 6B】useProgressData
 * ============================================================================ */
function useProgressData(userName) {
  const [allProgress, setAllProgress] = useState(null);
  const [loading, setLoading]         = useState(false);
  const [error, setError]             = useState(null);

  const fetchProgress = useCallback(async () => {
    if (!userName || userName === '訪客 (未登入)') return;
    setLoading(true);
    setError(null);

    if (isScriptConfigured()) {
      try {
        const res  = await fetch(
          `${CONFIG.GOOGLE_SCRIPT_URL}?action=getProgress&t=${Date.now()}`
        );
        if (res.ok) {
          const data = await res.json();
          if (data.progress && !data.error) {
            setAllProgress(data.progress);
            setLoading(false);
            return;
          }
        }
      } catch (e) { /* GAS 失敗，降級到 localStorage */ }
    }

    try {
      const result = {};
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!k || !k.startsWith(CONFIG.STORAGE.progress)) continue;
        const rest   = k.slice(CONFIG.STORAGE.progress.length);
        const sepIdx = rest.lastIndexOf('_');
        if (sepIdx < 0) continue;
        const lessonId    = rest.slice(0, sepIdx);
        const studentName = rest.slice(sepIdx + 1);
        try {
          const val = JSON.parse(localStorage.getItem(k));
          if (!result[lessonId]) result[lessonId] = {};
          result[lessonId][studentName] = val;
        } catch { /* 略過損壞項目 */ }
      }
      const hasSomeLocalData = Object.keys(result).length > 0;
      setAllProgress(hasSomeLocalData ? result : { ...DUMMY_PROGRESS, ...result });
    } catch (e) {
      setAllProgress(DUMMY_PROGRESS);
      setError(e.message);
    }
    setLoading(false);
  }, [userName]);

  /* ★ 修復 5：新增 isAssignment 參數，非任務模式不寫入 */
  const submitProgress = useCallback(async (lessonId, progressObj, isAssignment = true) => {
    if (!userName || userName === '訪客 (未登入)') return;
    if (!isAssignment) {
      // 非派發任務 → 完全不記錄
      return;
    }

    saveLocalProgress(lessonId, userName, progressObj);

    if (isScriptConfigured()) {
      fetch(CONFIG.GOOGLE_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          action:     'saveProgress',
          lessonId,
          student:    userName,
          watchPct:   progressObj.watchPct    || 0,
          answers:    progressObj.answers     || {},
          completedAt: progressObj.completedAt || '',
          startedAt:  progressObj.startedAt   || new Date().toISOString(),
        })
      }).catch(() => { /* 靜默失敗，本機已備份 */ });
    }

    setAllProgress(prev => {
      const next = { ...(prev || {}) };
      if (!next[lessonId]) next[lessonId] = {};
      next[lessonId][userName] = { ...progressObj };
      return next;
    });
  }, [userName]);

  useEffect(() => { fetchProgress(); }, [fetchProgress]);

  const getProgress = useCallback((lessonId, name = userName) => {
    if (allProgress && allProgress[lessonId] && allProgress[lessonId][name]) {
      return allProgress[lessonId][name];
    }
    return loadLocalProgress(lessonId, name || userName);
  }, [allProgress, userName]);

  return { allProgress, loading, error, submitProgress, getProgress, refetch: fetchProgress };
}

const ProgressRing = memo(function ProgressRing({ pct = 0, size = 48, strokeWidth = 4, label = '', className = '' }) {
  const r   = (size - strokeWidth * 2) / 2;
  const C   = 2 * Math.PI * r;
  const offset = C - (pct / 100) * C;
  const color = pct >= CONFIG.VIDEO_COMPLETE_THRESHOLD ? '#22c55e'
              : pct >= 30 ? '#f59e0b' : '#ef4444';
  return (
    <div className={`relative inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}>
      <svg width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="currentColor" className="text-gray-200 dark:text-gray-700" strokeWidth={strokeWidth} />
        <circle cx={size/2} cy={size/2} r={r} fill="none"
          stroke={color} strokeWidth={strokeWidth} strokeLinecap="round"
          strokeDasharray={C} strokeDashoffset={offset}
          className="progress-ring-circle" />
      </svg>
      <span className="absolute text-[10px] font-bold" style={{ color }}>
        {label || `${Math.round(pct)}%`}
      </span>
    </div>
  );
});

function PendingTasksSection({ lessons, userForm, getProgress, onOpenLesson }) {
  const pendingLessons = useMemo(() => {
    return lessons
      .filter(l => isAssignedLesson(l))                              /* ★ 只計派發任務 */
      .filter(l => matchesTargetForm(l.targetForm, userForm))
      .filter(l => !getProgress(l.id)?.completedAt)
      .sort((a, b) => {
        const aOver = a.dueDate && isOverdue(a.dueDate);
        const bOver = b.dueDate && isOverdue(b.dueDate);
        if (aOver && !bOver) return -1;
        if (!aOver && bOver) return 1;
        if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
        if (a.dueDate) return -1;
        if (b.dueDate) return 1;
        return 0;
      });
  }, [lessons, userForm, getProgress]);

  if (pendingLessons.length === 0) {
    return (
      <div className="bg-gradient-to-br from-green-50 to-emerald-50 dark:from-green-900/20 dark:to-emerald-900/20 border border-green-200 dark:border-green-800/50 rounded-2xl p-6 text-center">
        <div className="text-4xl mb-2">🎉</div>
        <p className="font-bold text-green-700 dark:text-green-300">太棒了！沒有待辦任務</p>
        <p className="text-xs text-green-600/70 dark:text-green-400/70 mt-1">繼續探索影片庫學習更多內容吧</p>
      </div>
    );
  }

  const [focus, ...rest] = pendingLessons;

  return (
    <div className="space-y-3">
      <FocusTaskCard
        lesson={focus}
        progress={getProgress(focus.id)}
        onClick={() => onOpenLesson(focus)}
      />

      {rest.length > 0 && (
        <div className="space-y-2">
          <p className="text-xs font-bold text-gray-500 dark:text-gray-400 px-1">
            其他待辦 ({rest.length})
          </p>
          {rest.slice(0, 3).map(lesson => {
            const prog = getProgress(lesson.id);
            const watchPct = prog?.watchPct || 0;
            const overdue = lesson.dueDate && isOverdue(lesson.dueDate);
            const days = daysUntilDue(lesson.dueDate);

            return (
              <button
                key={lesson.id}
                onClick={() => onOpenLesson(lesson)}
                className={`w-full text-left rounded-xl border p-2.5 transition-all hover:scale-[1.005] active:scale-[0.99] ${
                  overdue
                    ? 'border-red-200 dark:border-red-800/50 bg-red-50/50 dark:bg-red-900/10'
                    : 'border-gray-100 dark:border-gray-700 bg-white dark:bg-gray-800'
                }`}
              >
                <div className="flex items-center gap-2.5">
                  <div className={`w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0 ${
                    overdue ? 'bg-red-100 dark:bg-red-900/40 text-red-600' :
                    watchPct > 0 ? 'bg-blue-100 dark:bg-blue-900/40 text-blue-600' :
                    'bg-indigo-100 dark:bg-indigo-900/40 text-indigo-600'
                  }`}>
                    <i className={`fas ${overdue ? 'fa-exclamation' : watchPct > 0 ? 'fa-play' : 'fa-bolt'} text-xs`}></i>
                  </div>

                  <div className="flex-1 min-w-0">
                    <p className="font-bold text-gray-800 dark:text-gray-100 text-sm truncate">
                      {lesson.title}
                    </p>
                    <div className="flex items-center gap-2 text-[10px] text-gray-400 dark:text-gray-500 mt-0.5">
                      {lesson.dueDate && (
                        <span className={overdue ? 'text-red-500 font-bold' : days <= 3 ? 'text-amber-600 font-bold' : ''}>
                          {overdue ? `逾期 ${Math.abs(days)} 天` : days === 0 ? '今日截止' : `${days} 天後`}
                        </span>
                      )}
                      {watchPct > 0 && (
                        <span className={watchPctColor(watchPct) + ' font-bold'}>
                          ▶ {fmtPct(watchPct)}
                        </span>
                      )}
                    </div>
                  </div>

                  <i className="fas fa-chevron-right text-gray-300 dark:text-gray-600 text-xs"></i>
                </div>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

  const teacher = previewStudent ? false : isTeacher(userName);

  const [activeTab, setActiveTab] = useState('home');

  const [search, setSearch] = useState('');
  const [openTopics, setOpenTopics] = useState({});

  const userForm = !teacher ? parseUserForm(userName) : null;
  const greeting = useMemo(() => getGreeting(), []);

  const visibleLessons = useMemo(() => {
    if (teacher) return lessons;
    return lessons.filter(l => matchesTargetForm(l.targetForm, userForm));
  }, [lessons, teacher, userForm]);

  const filteredLessons = useMemo(() => {
    let list = visibleLessons;
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(l => l.title.toLowerCase().includes(q) || l.topic.toLowerCase().includes(q));
    }
    if (filter === 'pending') {
      list = list.filter(l => isAssignedLesson(l) && !getProgress(l.id)?.completedAt);
    } else if (filter === 'completed') {
      list = list.filter(l => !!getProgress(l.id)?.completedAt);
    } else if (filter === 'free') {
      list = list.filter(l => !isAssignedLesson(l));
    }
    return list;
  }, [visibleLessons, search, filter, getProgress]);

  /* 修復：完成數只計派發任務 */
  const completedCount = useMemo(() =>
    visibleLessons.filter(l => isAssignedLesson(l) && !!getProgress(l.id)?.completedAt).length,
  [visibleLessons, getProgress]);

  const inProgressCount = useMemo(() =>
    visibleLessons.filter(l => {
      if (!isAssignedLesson(l)) return false;
      const p = getProgress(l.id);
      return p && !p.completedAt && (p.watchPct || 0) > 0;
    }).length,
  [visibleLessons, getProgress]);

  const pendingCount = useMemo(() =>
    visibleLessons.filter(l => {
      if (!isAssignedLesson(l)) return false;
      const p = getProgress(l.id);
      return !p?.completedAt;
    }).length,
  [visibleLessons, getProgress]);

  const totalAssignedLessons = useMemo(() =>
    visibleLessons.filter(l => isAssignedLesson(l)).length,
  [visibleLessons]);

  const freeCount = useMemo(() =>
    visibleLessons.filter(l => !isAssignedLesson(l)).length,
  [visibleLessons]);

  // 已觀看影片（任何 watchPct > 0 的影片）
  const watchedCount = useMemo(() =>
    visibleLessons.filter(l => (getProgress(l.id)?.watchPct || 0) > 0).length,
  [visibleLessons, getProgress]);

  const toggleTopic = (topic) => {
    setOpenTopics(prev => ({ ...prev, [topic]: !prev[topic] }));
  };

  const groupedLessons = useMemo(() => {
    if (!filteredLessons) return {};
    return filteredLessons.reduce((acc, lesson) => {
      const topic = (lesson.topic && lesson.topic.trim() !== '') ? lesson.topic : '未分類';
      if (!acc[topic]) acc[topic] = [];
      acc[topic].push(lesson);
      return acc;
    }, {});
  }, [filteredLessons]);

  const sortedTopicEntries = useMemo(() => {

  function getTopicOrder(topic) {
    if (!topic) {
      return { group: 999, num: 999 };
    }

    const t = topic.trim();

    // Ch.1 ~ Ch.30
    const chMatch = t.match(/^Ch\.?\s*(\d+)/i);
    if (chMatch) {
      return {
        group: 1,
        num: parseInt(chMatch[1], 10)
      };
    }

    // E1 ~ E4
    const eMatch = t.match(/^E\s*(\d+)/i);
    if (eMatch) {
      return {
        group: 2,
        num: parseInt(eMatch[1], 10)
      };
    }

    // 其他分類
    if (t === '未分類') {
      return {
        group: 999,
        num: 999
      };
    }

    return {
      group: 500,
      num: 500
    };
  }

  return Object.entries(groupedLessons).sort(([topicA], [topicB]) => {

    const a = getTopicOrder(topicA);
    const b = getTopicOrder(topicB);

    // 先按群組排序
    if (a.group !== b.group) {
      return a.group - b.group;
    }

    // 同群組按數字排序
    if (a.num !== b.num) {
      return a.num - b.num;
    }

    // 最後按字母
    return topicA.localeCompare(topicB, 'zh-Hant');
  });

}, [groupedLessons]);

function StudentStatsView({ userName, lessons, getProgress }) {
  const stats = useMemo(() => {
    return lessons.map(l => {
      const p = getProgress(l.id);
      return {
        lesson: l,
        watchPct:    p?.watchPct   || 0,
        answered:    p?.answers ? Object.keys(p.answers).length : 0,
        totalQ:      l.questions?.length || 0,
        completedAt: p?.completedAt || null,
        startedAt:   p?.startedAt  || null,
      };
    });
  }, [lessons, getProgress]);

  const completed  = stats.filter(s => s.completedAt).length;
  const inProgress = stats.filter(s => !s.completedAt && s.watchPct > 0).length;
  const avgWatch   = stats.length > 0
    ? Math.round(stats.reduce((a,s) => a + s.watchPct, 0) / stats.length)
    : 0;
  const totalAnswered = stats.reduce((a,s) => a + s.answered, 0);

  if (stats.length === 0) {
    return <EmptyState icon="📚" title="尚無派發任務" subtitle="完成派發的課題後這裡將顯示你的進度統計" />;
  }

  return (
    <div className="space-y-4">
      <div className="grid grid-cols-2 gap-2">
        <div className="bg-gradient-to-br from-green-500 to-emerald-500 text-white p-4 rounded-2xl">
          <div className="text-3xl mb-1">✅</div>
          <div className="text-2xl font-extrabold">{completed}</div>
          <div className="text-xs text-white/85">已完成課題</div>
        </div>
        <div className="bg-gradient-to-br from-indigo-500 to-purple-500 text-white p-4 rounded-2xl">
          <div className="text-3xl mb-1">📊</div>
          <div className="text-2xl font-extrabold">{avgWatch}%</div>
          <div className="text-xs text-white/85">平均觀看率</div>
        </div>
      </div>

      <div className="grid grid-cols-2 gap-2">
        <div className="bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 p-3 rounded-xl">
          <div className="text-xs text-gray-400 mb-1"><i className="fas fa-play-circle text-blue-500 mr-1"></i>進行中</div>
          <div className="text-xl font-bold text-gray-800 dark:text-gray-100">{inProgress}</div>
        </div>
        <div className="bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 p-3 rounded-xl">
          <div className="text-xs text-gray-400 mb-1"><i className="fas fa-pen-to-square text-purple-500 mr-1"></i>已作答題</div>
          <div className="text-xl font-bold text-gray-800 dark:text-gray-100">{totalAnswered}</div>
        </div>
      </div>

      <div>
        <h3 className="font-bold text-gray-700 dark:text-gray-200 mb-2 text-sm flex items-center gap-2">
          <i className="fas fa-list-check text-indigo-500"></i>所有派發任務進度
        </h3>
        <div className="space-y-2">
          {stats.map(s => (
            <div key={s.lesson.id}
              className="flex items-center gap-3 bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-xl p-3">
              <ProgressRing pct={s.watchPct} size={40} strokeWidth={4} />

/* ============================================================================
 * 【區塊 9】LESSON PLAYER SCREEN

function LessonPlayerScreen({ lesson, userName, initialProgress, onSaveProgress, onBack, isAssignment }) {
  const toast = useToast();

  const [watchPct, setWatchPct]         = useState(initialProgress?.watchPct || 0);
  const [maxWatchPct, setMaxWatchPct]   = useState(initialProgress?.watchPct || 0);
  const [answers, setAnswers]           = useState(initialProgress?.answers || {});
  const [completedAt, setCompletedAt]   = useState(initialProgress?.completedAt || null);
  const [videoReady, setVideoReady]     = useState(false);
  const [isPlaying, setIsPlaying]       = useState(false);
  const [submitLoading, setSubmitLoading] = useState(false);

  const playerRef    = useRef(null);
  const trackTimer   = useRef(null);
  const containerRef = useRef(null);
  const watchedSecondsRef = useRef(new Set());
  const replayMapRef = useRef({}); /* ★ 熱點圖：記錄每秒重看次數 */
  const hasVideo     = lesson.videoId &&
                       lesson.videoId !== 'PLACEHOLDER_VIDEO_ID' &&
                       lesson.videoId !== 'YOUTUBE_VIDEO_ID_HERE' &&
                       String(lesson.videoId).trim() !== '';
  const questionsUnlocked = !isAssignment || maxWatchPct >= CONFIG.VIDEO_UNLOCK_THRESHOLD;
  const totalQ  = lesson.questions?.length || 0;
  const answered = Object.keys(answers).length;
  const allAnswered = totalQ === 0
    ? (maxWatchPct >= CONFIG.VIDEO_COMPLETE_THRESHOLD)
    : (answered >= totalQ);

  useEffect(() => {
    if (!hasVideo) return;
    let mounted = true;
    watchedSecondsRef.current.clear();
    loadYouTubeAPI().then(YT => {
      if (!mounted) return;
      playerRef.current = new YT.Player(containerRef.current, {
        videoId: lesson.videoId,
        playerVars: { rel: 0, modestbranding: 1, cc_load_policy: 0, hl: 'zh-TW' },
        events: {
          onReady: () => {
            if (!mounted) return;
            setVideoReady(true);
            const dur = playerRef.current?.getDuration?.() || 0;
            if (dur > 0 && initialProgress?.watchPct > 0) {
              const prefilledSeconds = Math.floor((initialProgress.watchPct / 100) * dur);
              for (let s = 0; s < prefilledSeconds; s++) watchedSecondsRef.current.add(s);
              /* ★ 斷點續播：自動跳至上次觀看位置 */
              const seekTime = Math.floor((initialProgress.watchPct / 100) * dur);
              if (seekTime > 10) {
                try { playerRef.current.seekTo(seekTime, true); } catch {}
              }
            }
          },
          onStateChange: (e) => {
            if (!mounted) return;
            if (e.data === 1) { setIsPlaying(true);  startTracking(YT); }
            else              { setIsPlaying(false); stopTracking(); }
          }
        }
      });
    });
    return () => {
      mounted = false;
      stopTracking();
      if (playerRef.current && playerRef.current.destroy) {
        try { playerRef.current.destroy(); } catch { /* ignore */ }
      }
    };
  }, [lesson.videoId]);

  function startTracking(YT) {
    if (trackTimer.current) clearInterval(trackTimer.current);
    trackTimer.current = setInterval(() => {
      if (!playerRef.current || !playerRef.current.getCurrentTime) return;
      const cur  = Math.floor(playerRef.current.getCurrentTime());
      const dur  = playerRef.current.getDuration();
      if (dur > 0) {
        watchedSecondsRef.current.add(cur);
        replayMapRef.current[cur] = (replayMapRef.current[cur] || 0) + 1; /* ★ 重看計數 */
        const actualWatchPct = (watchedSecondsRef.current.size / dur) * 100;
        setMaxWatchPct(prev => Math.max(prev, actualWatchPct));
      }
    }, 1000);
  }

  function stopTracking() {
    if (trackTimer.current) { clearInterval(trackTimer.current); trackTimer.current = null; }
  }

  /* ★★★ 修復 5：只有派發任務才寫入進度 ★★★ */
  useEffect(() => {
    if (!isAssignment) return;
    /* ★ 只保留重看次數 > 1 的片段 */
    const heatmap = {};
    Object.entries(replayMapRef.current).forEach(([sec, cnt]) => {
      if (cnt > 1) heatmap[sec] = cnt;
    });
    const prog = {
      watchPct: maxWatchPct, answers, completedAt,
      startedAt: initialProgress?.startedAt || new Date().toISOString(),
      ...(Object.keys(heatmap).length > 0 ? { heatmap } : {})
    };
    onSaveProgress(lesson.id, prog, true);
  }, [maxWatchPct, completedAt, answers, isAssignment]);

  async function handleSubmit() {
    if (!isAssignment) return;
    if (!questionsUnlocked) { toast(`請先觀看影片至 ${CONFIG.VIDEO_UNLOCK_THRESHOLD}%`, 'warning'); return; }
    if (!allAnswered) { toast('請先回答所有題目', 'warning'); return; }
    setSubmitLoading(true);
    const now = new Date().toISOString();
    const prog = {
      watchPct: maxWatchPct, answers, completedAt: now,
      startedAt: initialProgress?.startedAt || now
    };
    await onSaveProgress(lesson.id, prog, true);
    setCompletedAt(now);
    setSubmitLoading(false);
    toast('🎉 課題完成！進度已儲存', 'success', 4000);
  }

  function setAnswer(qId, val) {
    setAnswers(prev => ({ ...prev, [qId]: val }));
  }

  useEffect(() => {
    const handleVisibilityChange = () => {
      if (document.hidden && playerRef.current && playerRef.current.getPlayerState) {
        if (playerRef.current.getPlayerState() === 1) {
          playerRef.current.pauseVideo();
          if (isAssignment) toast("影片已暫停！請保持在當前畫面上課喔👀", "warning", 5000);
        }
      }
    };
    document.addEventListener('visibilitychange', handleVisibilityChange);
    return () => document.removeEventListener('visibilitychange', handleVisibilityChange);
  }, [toast, isAssignment]);

  return (
    <div className="w-full max-w-2xl landscape:max-w-5xl">
      <div className="glass-panel rounded-3xl shadow-xl overflow-hidden">

        <div className="flex items-center gap-3 p-4 border-b border-gray-100 dark:border-gray-700 bg-gradient-to-r from-indigo-50 to-purple-50 dark:from-indigo-900/30 dark:to-purple-900/30">
          <button onClick={onBack}
            className="w-9 h-9 rounded-full bg-white dark:bg-gray-700 shadow flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors flex-shrink-0">
            <i className="fas fa-arrow-left"></i>
          </button>
          <div className="flex-1 min-w-0">
            <span className="text-xs text-indigo-500 dark:text-indigo-400 font-bold">{lesson.topic}</span>
            <h2 className="font-bold text-gray-800 dark:text-gray-100 truncate text-sm md:text-base">
              {lesson.title}
            </h2>
          </div>
          {completedAt && isAssignment && (
            <span className="flex-shrink-0 text-xs bg-green-100 dark:bg-green-900/50 text-green-700 dark:text-green-300 px-2 py-1 rounded-full font-bold">
              <i className="fas fa-check-circle mr-1"></i>已完成
            </span>
          )}
          {!isAssignment && (
            <span className="flex-shrink-0 text-xs bg-amber-100 dark:bg-amber-900/50 text-amber-700 dark:text-amber-300 px-2 py-1 rounded-full font-bold">
              <i className="fas fa-eye mr-1"></i>自由觀看
            </span>
          )}
        </div>

        <div className="overflow-y-auto custom-scrollbar max-h-[calc(92vh-64px)] p-4 md:p-6">

          {/* ★ 自由觀看模式提示橫幅 */}
          {!isAssignment && (
            <div className="mb-3 p-3 bg-gradient-to-r from-amber-50 to-orange-50 dark:from-amber-900/20 dark:to-orange-900/20 border border-amber-200 dark:border-amber-800 rounded-xl flex items-start gap-2.5">
              <i className="fas fa-info-circle text-amber-500 mt-0.5"></i>
              <div className="flex-1 text-xs">
                <p className="font-bold text-amber-700 dark:text-amber-300">自由觀看模式</p>
                <p className="text-amber-600 dark:text-amber-400 mt-0.5">此影片並非派發任務，觀看進度與答題不會被記錄。</p>
              </div>
            </div>
          )}

          <div className="mb-4">
            <div className="relative rounded-2xl overflow-hidden shadow-lg bg-black aspect-video">
              {hasVideo ? (
                <div ref={containerRef} className="w-full h-full" />
              ) : (
                <div className="video-placeholder absolute inset-0 flex flex-col items-center justify-center gap-3">
                  <div className="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-lg text-center max-w-xs border-2 border-dashed border-gray-300 dark:border-gray-600">
                    <i className="fab fa-youtube text-5xl text-red-500 mb-3"></i>
                    <p className="font-bold text-gray-700 dark:text-gray-200 text-sm">影片尚未設定</p>
                  </div>
                </div>
              )}
            </div>

            {/* 觀看進度條（自由觀看時不顯示） */}
            {isAssignment && (
              <div className="mt-3 bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-xl p-3">
                <div className="flex items-center justify-between mb-1.5">
                  <span className="text-xs font-bold text-gray-600 dark:text-gray-300 flex items-center gap-1.5">
                    <i className="fas fa-eye text-indigo-500"></i>
                    影片觀看進度
                  </span>
                  <span className={`text-sm font-extrabold ${watchPctColor(maxWatchPct)}`}>
                    {fmtPct(maxWatchPct)}
                  </span>
                </div>
                <div className="h-2 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
                  <div className={`h-full rounded-full transition-all duration-700 bg-gradient-to-r ${watchPctGradient(maxWatchPct)}`}
                       style={{ width: fmtPct(maxWatchPct) }} />
                </div>

                {!questionsUnlocked && (
                  <div className="mt-2 text-xs text-amber-600 dark:text-amber-400 flex items-center gap-1.5">
                    <i className="fas fa-lock"></i>
                    <span>觀看至 <strong>{CONFIG.VIDEO_UNLOCK_THRESHOLD}%</strong> 解鎖題目（差 {Math.max(0, CONFIG.VIDEO_UNLOCK_THRESHOLD - Math.round(maxWatchPct))}%）</span>
                  </div>
                )}
                {questionsUnlocked && !completedAt && totalQ > 0 && (
                  <div className="mt-2 text-xs text-green-600 dark:text-green-400 flex items-center gap-1.5">
                    <i className="fas fa-unlock"></i>
                    <span>已解鎖題目！請完成下方問題</span>
                  </div>
                )}
              </div>
            )}
          </div>

          {/* 題目區（只在派發任務時顯示） */}
          {isAssignment && (
            <div className="relative">
              {!questionsUnlocked && (
                <div className="question-lock-overlay absolute inset-0 z-10 rounded-2xl bg-white/70 dark:bg-gray-900/70 flex flex-col items-center justify-center gap-3" style={{pointerEvents:'all'}}>
                  <i className="fas fa-lock text-4xl text-gray-400 dark:text-gray-500"></i>
                  <p className="text-sm font-bold text-gray-500 dark:text-gray-400">
                    觀看影片達 {CONFIG.VIDEO_UNLOCK_THRESHOLD}% 後解鎖題目
                  </p>
                </div>
              )}

              {totalQ === 0 ? (
                <div className="py-8 text-center text-gray-400 dark:text-gray-500 border-2 border-dashed border-gray-200 dark:border-gray-700 rounded-2xl">
                  <i className="fas fa-question-circle text-3xl mb-2 opacity-40"></i>
                  <p className="text-sm font-bold">本課題無問答題目</p>
                  <p className="text-xs mt-1 text-gray-400">觀看達 {CONFIG.VIDEO_COMPLETE_THRESHOLD}% 後即可完成課題</p>
                  {!completedAt && allAnswered && (
                    <button onClick={handleSubmit} disabled={submitLoading}
                      className="mt-3 px-6 py-2 bg-gradient-to-r from-green-500 to-emerald-500 text-white rounded-xl font-bold text-sm shadow hover:scale-[1.02] transition-all">
                      {submitLoading ? <><i className="fas fa-spinner fa-spin mr-1"></i>儲存中...</> : <><i className="fas fa-paper-plane mr-1"></i>標記為已完成</>}
                    </button>
                  )}
                </div>
              ) : (
                <div className="space-y-3">
                  <div className="flex items-center justify-between">
                    <h3 className="font-bold text-gray-700 dark:text-gray-200 flex items-center gap-2 text-sm">
                      <i className="fas fa-clipboard-question text-indigo-500"></i>
                      課題問題
                    </h3>
                    <span className="text-xs bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-300 px-2 py-0.5 rounded-full font-bold">
                      {answered} / {totalQ}
                    </span>
                  </div>

                  {lesson.questions.map((q, idx) => (
                    <QuestionItem
                      key={q.id}
                      question={q}
                      index={idx}
                      answer={answers[q.id]}
                      onAnswer={(val) => setAnswer(q.id, val)}
                      disabled={!!completedAt}
                    />
                  ))}

                  {!completedAt && (
                    <button onClick={handleSubmit}
                      disabled={!allAnswered || submitLoading}
                      className={`w-full py-3 px-6 rounded-2xl font-bold shadow-lg transition-all flex items-center justify-center gap-2 mt-2 ${
                        allAnswered
                          ? 'bg-gradient-to-r from-green-500 to-emerald-500 hover:from-green-600 hover:to-emerald-600 text-white hover:scale-[1.02]'
                          : 'bg-gray-200 dark:bg-gray-700 text-gray-400 dark:text-gray-500 cursor-not-allowed'
                      }`}>
                      {submitLoading
                        ? <><i className="fas fa-spinner fa-spin"></i>儲存中...</>
                        : allAnswered
                          ? <><i className="fas fa-paper-plane"></i>提交答案</>
                          : <><i className="fas fa-pen"></i>請完成所有題目（{answered}/{totalQ}）</>}
                    </button>
                  )}

                  {completedAt && (
                    <div className="p-4 bg-gradient-to-br from-green-50 to-emerald-50 dark:from-green-900/30 dark:to-emerald-900/30 border border-green-200 dark:border-green-700 rounded-2xl text-center">
                      <i className="fas fa-trophy text-3xl text-yellow-500 mb-2"></i>
                      <p className="font-bold text-green-700 dark:text-green-300">課題已完成！</p>
                      <p className="text-xs text-green-600 dark:text-green-400 mt-1">
                        完成時間：{new Date(completedAt).toLocaleString('zh-HK')}
                      </p>
                    </div>
                  )}
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function QuestionItem({ question, index, answer, onAnswer, disabled }) {
  return (
    <div className="bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-2xl p-4 shadow-sm">
      <p className="text-sm font-bold text-gray-700 dark:text-gray-200 mb-3 flex items-start gap-2">
        <span className="inline-flex items-center justify-center w-6 h-6 rounded-full bg-gradient-to-br from-indigo-500 to-purple-500 text-white text-xs font-bold flex-shrink-0">
          {index + 1}
        </span>
        <span>{question.text}</span>
      </p>

      {question.type === 'mcq' && Array.isArray(question.options) && (
        <div className="grid grid-cols-1 gap-2">
          {question.options.map((opt, oi) => {
            const selected  = answer === String(oi);
            const isCorrect = disabled && String(oi) === String(question.answer);
            const isWrong   = disabled && selected && String(oi) !== String(question.answer);
            return (
              <button key={oi} onClick={() => !disabled && onAnswer(String(oi))}
                className={`text-left px-4 py-2.5 rounded-xl border-2 text-sm transition-all font-medium ${
                  disabled
                    ? isCorrect ? 'border-green-400 bg-green-50 dark:bg-green-900/30 text-green-700 dark:text-green-300'
                      : isWrong  ? 'border-red-400 bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400'
                      : 'border-gray-200 dark:border-gray-600 text-gray-500 dark:text-gray-400 opacity-60'
                    : selected
                      ? 'border-indigo-500 bg-indigo-50 dark:bg-indigo-900/40 text-indigo-700 dark:text-indigo-300 shadow'
                      : 'border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-200 hover:border-indigo-300 dark:hover:border-indigo-600 hover:bg-indigo-50/50 dark:hover:bg-indigo-900/20'
                }`}>
                <span className="font-bold mr-2">{['A','B','C','D','E'][oi]}.</span>
                {opt}
                {disabled && isCorrect && <i className="fas fa-check ml-2 text-green-500"></i>}
                {disabled && isWrong   && <i className="fas fa-times ml-2 text-red-500"></i>}
              </button>
            );
          })}
        </div>
      )}

      {question.type === 'fill' && (
        <div>
          <input
            type="text"
            value={answer || ''}
            onChange={e => !disabled && onAnswer(e.target.value)}
            disabled={disabled}
            placeholder="請在此輸入答案..."
            className={`w-full px-4 py-2.5 border-2 rounded-xl text-sm focus:outline-none transition-colors ${
              disabled
                ? 'border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-600 dark:text-gray-300 cursor-default'
                : 'border-gray-200 dark:border-gray-600 focus:border-indigo-400 dark:focus:border-indigo-500 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200'
            }`}
          />
          {disabled && answer && (
            <div className="mt-1.5 text-xs text-green-600 dark:text-green-400">
              <i className="fas fa-check-circle mr-1"></i>
              參考答案：{question.answer}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ============================================================================
 * 【區塊 11】TEACHER DASHBOARD SCREEN
 * ============================================================================ */
function TeacherDashboardScreen({ lessons, allProgress, registeredUsers, onBack, onViewLessonReport, onRefresh, loading }) {
  /* ★ 只看派發任務 */
  const assignedLessons = useMemo(() => lessons.filter(l => isAssignedLesson(l)), [lessons]);

  const lessonStats = useMemo(() => {
    const allKnown = new Set();
    Object.values(allProgress || {}).forEach(lp => Object.keys(lp).forEach(n => allKnown.add(n)));
    (registeredUsers || []).forEach(n => allKnown.add(n));

    return assignedLessons.map(lesson => {
      const progressMap = allProgress?.[lesson.id] || {};
      const students    = Object.entries(progressMap);
      const started     = students.length;
      const completed   = students.filter(([,p]) => p.completedAt).length;
      const avgWatch    = started > 0
        ? Math.round(students.reduce((a,[,p]) => a + (p.watchPct||0), 0) / started)
        : 0;
      const classmates  = [...allKnown].filter(name => matchesTargetForm(lesson.targetForm, parseUserForm(name)));
      const notStarted  = classmates.filter(name => !progressMap[name]).length;
      return { lesson, started, completed, avgWatch, progressMap, classmates: classmates.length, notStarted };
    });
  }, [assignedLessons, allProgress, registeredUsers]);

  /* ★ 修復 1：合併已登入用戶與有進度紀錄者 */
  const totalStudents = useMemo(() => {
    const names = new Set();
    Object.values(allProgress || {}).forEach(lp =>
      Object.keys(lp).forEach(n => names.add(n))
    );
    (registeredUsers || []).forEach(n => names.add(n));
    return names.size;
  }, [allProgress, registeredUsers]);

  const totalCompleted = lessonStats.reduce((a,s) => a + s.completed, 0);
  const totalStarted   = lessonStats.reduce((a,s) => a + s.started, 0);
  const totalExpected  = lessonStats.reduce((a,s) => a + s.classmates, 0);
  const completionRate = totalExpected > 0 ? Math.round((totalCompleted / totalExpected) * 100) : 0;

  return (
    <div className="w-full max-w-3xl">
      <div className="glass-panel rounded-3xl shadow-xl overflow-hidden flex flex-col" style={{ maxHeight: '94vh' }}>

        <div className="hero-gradient p-5 text-white relative flex-shrink-0">
          <div className="flex items-center gap-3 mb-4 relative">
            <button onClick={onBack}
              className="w-9 h-9 rounded-full bg-white/20 backdrop-blur flex items-center justify-center hover:bg-white/30 transition-colors">
              <i className="fas fa-arrow-left"></i>
            </button>
            <div className="flex-1 min-w-0">
              <h2 className="font-bold text-lg">
                <i className="fas fa-chalkboard-teacher mr-2"></i>教師儀表板
              </h2>
              <p className="text-xs text-white/80">
                {(registeredUsers || []).length > 0 && `已登入 ${(registeredUsers || []).length} 位學生 · `}
                查看全班學習情況
              </p>
            </div>
            <button onClick={onRefresh}
              className="w-9 h-9 rounded-full bg-white/20 backdrop-blur flex items-center justify-center hover:bg-white/30 transition-colors"
              title="重新整理">
              <i className={`fas fa-rotate-right ${loading ? 'fa-spin' : ''}`}></i>
            </button>
          </div>

          <div className="grid grid-cols-4 gap-2 relative">
            {[
              { label: '派發任務', value: assignedLessons.length },
              { label: '參與學生', value: totalStudents },
              { label: '完成人次', value: totalCompleted },
              { label: '完成率',   value: `${completionRate}%` },
            ].map((s, i) => (
              <div key={i} className="bg-white/15 backdrop-blur rounded-xl p-2.5 text-center">
                <div className="text-xs text-white/80">{s.label}</div>
                <div className="text-xl sm:text-2xl font-extrabold mt-0.5">{s.value}</div>
              </div>
            ))}
          </div>
        </div>

        <div className="flex-1 overflow-y-auto custom-scrollbar p-4 sm:p-6">
          {assignedLessons.length === 0 ? (
            <EmptyState icon="📭" title="尚未派發任何任務" subtitle="返回主頁點擊「發佈影片任務」開始建立。" />
          ) : (
            <TeacherLessonsByGrade
              lessonStats={lessonStats}
              registeredUsers={registeredUsers}
              onViewLessonReport={onViewLessonReport}
            />
          )}
        </div>
      </div>
    </div>
  );
}

function TeacherLessonsByGrade({ lessonStats, registeredUsers, onViewLessonReport }) {
  const [gradeFilter, setGradeFilter] = useState('all');

  const byGrade = useMemo(() => {
    const groups = { '4': [], '5': [], '6': [], 'all': [] };
    lessonStats.forEach(s => {
      const tf = (s.lesson.targetForm || 'All').trim().toUpperCase();
      if (!tf || tf === 'ALL') { groups['4'].push(s); groups['5'].push(s); groups['6'].push(s); groups['all'].push(s); }
      else {
        const g = tf.match(/^([4-6])/);
        if (g) { groups[g[1]].push(s); groups['all'].push(s); }
        else groups['all'].push(s);
      }
    });
    const seen = new Set();
    groups['all'] = groups['all'].filter(s => { if (seen.has(s.lesson.id)) return false; seen.add(s.lesson.id); return true; });
    return groups;
  }, [lessonStats]);

  const GRADE_TABS = [
    { key: 'all', label: '全部' },
    { key: '4',   label: '中四' },
    { key: '5',   label: '中五' },
    { key: '6',   label: '中六' },
  ].filter(t => t.key === 'all' || byGrade[t.key]?.length > 0);

  const currentStats = byGrade[gradeFilter] || byGrade['all'];

  return (
    <div className="space-y-3">
      {GRADE_TABS.length > 1 && (
        <div className="flex bg-gray-100 dark:bg-gray-700 p-1 rounded-xl gap-1">
          {GRADE_TABS.map(t => (
            <button key={t.key}
              onClick={() => setGradeFilter(t.key)}
              className={`flex-1 py-1.5 text-xs font-bold rounded-lg transition-all ${
                gradeFilter === t.key
                  ? 'bg-white dark:bg-gray-600 text-indigo-600 dark:text-indigo-300 shadow-sm'
                  : 'text-gray-500 dark:text-gray-400'
              }`}
            >
              {t.label}
              {t.key !== 'all' && <span className="ml-1 text-[10px]">({byGrade[t.key]?.length || 0})</span>}
            </button>
          ))}
        </div>
      )}

      <h3 className="text-sm font-bold text-gray-600 dark:text-gray-300 flex items-center gap-2">
        <i className="fas fa-list-check text-indigo-500"></i>
        {gradeFilter === 'all' ? '所有派發任務' : `中${gradeFilter === '4' ? '四' : gradeFilter === '5' ? '五' : '六'}派發任務`}
      </h3>

      {currentStats.map(s => (
        <button key={s.lesson.id}
          onClick={() => onViewLessonReport(s.lesson)}
          className="w-full text-left bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-2xl p-4 hover:shadow-md hover:border-indigo-200 dark:hover:border-indigo-700 transition-all hover:-translate-y-0.5 card-elevation">
          <div className="flex items-start gap-3">
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 flex-wrap mb-1">
                <span className="text-xs bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-300 px-2 py-0.5 rounded-md font-bold">
                  {s.lesson.topic}
                </span>
                {s.lesson.targetForm && s.lesson.targetForm.toUpperCase() !== 'ALL' && s.lesson.targetForm !== '' && (
                  <span className="text-xs bg-amber-100 dark:bg-amber-900/50 text-amber-700 dark:text-amber-300 px-2 py-0.5 rounded-md font-bold">
                    <i className="fas fa-users mr-0.5"></i>中{s.lesson.targetForm === '4' ? '四' : s.lesson.targetForm === '5' ? '五' : s.lesson.targetForm === '6' ? '六' : s.lesson.targetForm}
                  </span>
                )}
                {s.lesson.dueDate && (
                  <span className={`text-xs px-2 py-0.5 rounded-md font-bold ${
                    isOverdue(s.lesson.dueDate)
                      ? 'bg-red-100 dark:bg-red-900/50 text-red-600 dark:text-red-300'
                      : 'bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400'
                  }`}>
                    截止 {s.lesson.dueDate}
                  </span>
                )}
              </div>
              <p className="font-bold text-gray-800 dark:text-gray-100 truncate">{s.lesson.title}</p>

              <div className="mt-2.5 grid grid-cols-2 gap-2">
                <div>
                  <div className="flex justify-between text-[10px] text-gray-400 mb-0.5">
                    <span>完成率</span>
                    <span className="font-bold">
                      {s.classmates > 0 ? `${Math.round((s.completed/s.classmates)*100)}%` : '—'}
                    </span>
                  </div>
                  <div className="h-1.5 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
                    <div className="h-full bg-gradient-to-r from-green-400 to-emerald-500 rounded-full transition-all duration-700"
                         style={{ width: s.classmates > 0 ? `${(s.completed/s.classmates)*100}%` : '0%' }} />
                  </div>
                </div>
                <div>
                  <div className="flex justify-between text-[10px] text-gray-400 mb-0.5">
                    <span>平均觀看</span>
                    <span className={`font-bold ${watchPctColor(s.avgWatch)}`}>{fmtPct(s.avgWatch)}</span>
                  </div>
                  <div className="h-1.5 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
                    <div className={`h-full rounded-full transition-all duration-700 bg-gradient-to-r ${watchPctGradient(s.avgWatch)}`}
                         style={{ width: fmtPct(s.avgWatch) }} />
                  </div>
                </div>
              </div>

function HeatmapView({ studentList }) {
  const data = useMemo(() => {
    const merged = {};
    studentList.forEach(s => {
      if (!s.heatmap) return;
      Object.entries(s.heatmap).forEach(([sec, cnt]) => {
        merged[Number(sec)] = (merged[Number(sec)] || 0) + cnt;
      });
    });
    const secKeys = Object.keys(merged).map(Number);
    if (secKeys.length === 0) return null;
    const totalDur = Math.max(...secKeys);
    const segCount = 20;
    const segs = [];
    for (let i = 0; i < segCount; i++) {
      const start = Math.floor((i / segCount) * totalDur);
      const end   = Math.floor(((i + 1) / segCount) * totalDur);
      let total = 0;
      secKeys.forEach(s => { if (s >= start && s < end) total += merged[s]; });
      segs.push({ start, end, total });
    }
    return { segs, totalDur, maxSeg: Math.max(...segs.map(s => s.total), 1) };
  }, [studentList]);

  if (!data) return <EmptyState icon="🔥" title="暫無重看熱點資料" subtitle="學生重複觀看某片段後，此處將顯示熱點分佈。" />;
  const { segs, totalDur, maxSeg } = data;
  const hotSegments = [...segs].filter(s => s.total > maxSeg * 0.4).sort((a,b) => b.total - a.total).slice(0, 5);

  return (
    <div className="space-y-4">
      <div className="p-3 bg-orange-50 dark:bg-orange-900/20 border border-orange-200 dark:border-orange-800 rounded-xl">
        <p className="text-xs font-bold text-orange-700 dark:text-orange-300 mb-1 flex items-center gap-1">
          <i className="fas fa-fire"></i>重看熱點圖
        </p>
        <p className="text-[11px] text-orange-600 dark:text-orange-400">條越高代表該片段被重複觀看次數越多，代表該處是學生難點，建議實體課重點講解。</p>
      </div>
      <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-100 dark:border-gray-700 p-4">
        <div className="flex items-end gap-0.5 h-24">
          {segs.map((seg, i) => {
            const h = (seg.total / maxSeg) * 100;
            const isHot = seg.total > maxSeg * 0.4;
            return (
              <div key={i} className="flex-1 flex flex-col items-center justify-end group relative">
                <div className={`w-full rounded-t ${isHot ? 'bg-gradient-to-t from-red-500 to-orange-400' : 'bg-gradient-to-t from-indigo-200 to-blue-200 dark:from-indigo-800 dark:to-blue-900'}`}
                     style={{ height: `${Math.max(h, 2)}%` }} />
                <div className="absolute bottom-full mb-1 hidden group-hover:block bg-gray-800 text-white text-[10px] px-2 py-1 rounded whitespace-nowrap z-10 pointer-events-none">
                  {Math.floor(seg.start/60)}:{String(seg.start%60).padStart(2,'0')}–{Math.floor(seg.end/60)}:{String(seg.end%60).padStart(2,'0')} · {seg.total}次
                </div>
              </div>
            );
          })}
        </div>
        <div className="flex justify-between text-[9px] text-gray-400 mt-1.5">
          <span>0:00</span>
          <span>{Math.floor(totalDur/60)}:{String(totalDur%60).padStart(2,'0')}</span>
        </div>
      </div>
      {hotSegments.length > 0 && (
        <div>
          <h4 className="text-xs font-bold text-gray-600 dark:text-gray-300 mb-2 flex items-center gap-1">
            <i className="fas fa-exclamation-triangle text-amber-500"></i>建議實體課重點講解片段
          </h4>
          <div className="space-y-2">
            {hotSegments.map((seg, i) => (
              <div key={i} className="flex items-center gap-3 bg-amber-50 dark:bg-amber-900/20 border border-amber-100 dark:border-amber-800/50 rounded-lg px-3 py-2">
                <span className="text-lg">{['🔥','🌡️','⚠️','📌','📍'][i]}</span>
                <div className="flex-1">
                  <p className="text-xs font-bold text-gray-700 dark:text-gray-200">
                    {Math.floor(seg.start/60)}:{String(seg.start%60).padStart(2,'0')} – {Math.floor(seg.end/60)}:{String(seg.end%60).padStart(2,'0')}
                  </p>
                  <p className="text-[10px] text-amber-600 dark:text-amber-400">重複觀看 {seg.total} 次</p>
                </div>
                <div className="w-16 h-1.5 bg-gray-200 dark:bg-gray-600 rounded-full overflow-hidden">
                  <div className="h-full bg-gradient-to-r from-orange-400 to-red-500 rounded-full" style={{ width: `${(seg.total/maxSeg)*100}%` }} />
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function TeacherLessonReportScreen({ lesson, allProgress, registeredUsers, onBack }) {
  const [expandedStudent, setExpandedStudent] = useState(null);
  const [showTab, setShowTab] = useState('started');

  const progressMap = allProgress?.[lesson.id] || {};
  const studentList = Object.entries(progressMap)
    .map(([name, p]) => ({ name, ...p }))
    .sort((a,b) => (b.watchPct||0) - (a.watchPct||0));

  /* ★ 修復 1：使用 registeredUsers 列出所有已登入但未開始的學生 */
  const notStartedStudents = useMemo(() => {
    const allKnown = new Set();
    Object.values(allProgress || {}).forEach(lp => Object.keys(lp).forEach(n => allKnown.add(n)));
    (registeredUsers || []).forEach(n => allKnown.add(n));
    return [...allKnown]
      .filter(name => matchesTargetForm(lesson.targetForm, parseUserForm(name)))
      .filter(name => !progressMap[name]);
  }, [allProgress, registeredUsers, lesson.targetForm, progressMap]);

  const totalQ     = lesson.questions?.length || 0;
  const avgWatch   = studentList.length > 0
    ? Math.round(studentList.reduce((a,s) => a + (s.watchPct||0), 0) / studentList.length)
    : 0;
  const completedCount = studentList.filter(s => s.completedAt).length;

  function exportCSV() {
    const headers = ['姓名', '班別', '觀看%', '已完成', '作答數', '開始時間', '完成時間'];
    const rows = [
      ...studentList.map(s => [
        shortenName(s.name),
        parseUserForm(s.name) || '',
        Math.round(s.watchPct || 0),
        s.completedAt ? '是' : '否',
        s.answers ? Object.keys(s.answers).length : 0,
        s.startedAt ? new Date(s.startedAt).toLocaleString('zh-HK') : '',
        s.completedAt ? new Date(s.completedAt).toLocaleString('zh-HK') : '',
      ]),
      ...notStartedStudents.map(name => [
        shortenName(name),
        parseUserForm(name) || '',
        0, '否', 0, '未點開', '',
      ]),
    ];
    const csv = [headers, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `${lesson.title}_進度.csv`; a.click();
    URL.revokeObjectURL(url);
  }

  return (
    <div className="w-full max-w-4xl">
      <div className="glass-panel rounded-3xl shadow-xl overflow-hidden flex flex-col" style={{ maxHeight: '94vh' }}>

        <div className="hero-gradient p-5 text-white relative flex-shrink-0">
          <div className="flex items-center gap-3 mb-4 relative">
            <button onClick={onBack}
              className="w-9 h-9 rounded-full bg-white/20 backdrop-blur flex items-center justify-center hover:bg-white/30">
              <i className="fas fa-arrow-left"></i>
            </button>
            <div className="flex-1 min-w-0">
              <span className="text-xs text-white/80">課題報告</span>
              <h2 className="font-bold text-base sm:text-lg truncate">{lesson.title}</h2>
            </div>
          </div>

          <div className="grid grid-cols-4 gap-2 relative">
            <div className="bg-white/15 backdrop-blur rounded-xl p-2 text-center">
              <div className="text-[10px] text-white/80">已點開</div>
              <div className="text-xl font-extrabold">{studentList.length}</div>
            </div>
            <div className="bg-white/15 backdrop-blur rounded-xl p-2 text-center">
              <div className="text-[10px] text-white/80">已完成</div>
              <div className="text-xl font-extrabold">{completedCount}</div>
            </div>
            <div className="bg-white/15 backdrop-blur rounded-xl p-2 text-center">
              <div className="text-[10px] text-white/80">平均觀看</div>
              <div className="text-xl font-extrabold">{fmtPct(avgWatch)}</div>
            </div>
            <div className="bg-white/15 backdrop-blur rounded-xl p-2 text-center">
              <div className="text-[10px] text-white/80">未點開</div>
              <div className="text-xl font-extrabold">{notStartedStudents.length}</div>
            </div>
          </div>
        </div>

        <div className="flex-1 overflow-y-auto custom-scrollbar p-4 sm:p-6">
          <div className="flex justify-end mb-2">
            <button onClick={exportCSV}
              className="flex items-center gap-1.5 text-xs px-3 py-1.5 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-green-50 hover:border-green-300 hover:text-green-700 transition-all font-bold">
              <i className="fas fa-file-csv text-green-500"></i>匯出 CSV

          </div>

          <div className="flex bg-gray-100 dark:bg-gray-700 p-1 rounded-xl mb-4">
            <button onClick={() => setShowTab('started')}
              className={`flex-1 py-1.5 text-xs font-bold rounded-lg transition-all ${showTab === 'started' ? 'bg-white dark:bg-gray-600 text-blue-600 dark:text-blue-300 shadow-sm' : 'text-gray-500 dark:text-gray-400'}`}>
              <i className="fas fa-play-circle mr-1"></i>已點開 ({studentList.length})
            </button>
            <button onClick={() => setShowTab('not_started')}

                {studentList.map(s => {

                  const isExpanded = expandedStudent === s.name;
                  return (
                    <div key={s.name} className="bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-xl overflow-hidden transition-all">
                      <div className="grid items-center px-3 sm:px-4 py-3 gap-2"

                        <div className="font-medium text-gray-700 dark:text-gray-200 text-sm truncate flex items-center gap-2">
                          <div className="w-7 h-7 rounded-full bg-gradient-to-br from-indigo-100 to-purple-100 dark:from-indigo-900/40 dark:to-purple-900/40 flex items-center justify-center text-[10px] font-bold text-indigo-600 dark:text-indigo-300 flex-shrink-0">
                            {getInitials(s.name)}
                          </div>
                          <span className="truncate">{shortenName(s.name)}</span>
                        </div>

                        <div className="flex items-center gap-1.5">

                        </div>

                        <div className="text-center text-xs">
                          {totalQ > 0
                            ? <span className={answered >= totalQ ? 'text-green-500 font-bold' : 'text-gray-500'}>
                                {answered}/{totalQ}
                              </span>
                            : <span className="text-gray-300">—</span>
                          }
                        </div>

                        <div className="flex justify-center">
                          <LessonStatusBadge status={
                            s.completedAt ? 'completed'
                            : answered > 0 ? 'answering'
                            : s.watchPct > 0 ? 'watching'
                            : 'not_started'
                          } compact />
                        </div>

                        <button onClick={() => setExpandedStudent(isExpanded ? null : s.name)}
                          className="flex items-center justify-center text-gray-400 hover:text-indigo-500">
                          <i className={`fas fa-chevron-${isExpanded ? 'up' : 'down'} text-xs`}></i>

                          {totalQ > 0 && (

                                      }`}>
                                        {q.type === 'mcq' ? `選 ${['A','B','C','D'][parseInt(ans)]}` : ans}
                                        <i className={`fas ${correct ? 'fa-check' : 'fa-times'} ml-1`}></i>
                                      </span>

                      )}

          ) : (
            notStartedStudents.length === 0 ? (
              <EmptyState icon="🎉" title="所有已登記學生均已點開！" />

              <div className="space-y-2">
                <p className="text-xs text-gray-400 dark:text-gray-500 italic bg-amber-50 dark:bg-amber-900/20 px-3 py-2 rounded-lg border border-amber-100 dark:border-amber-800/30">

                    </div>

              </div>
            )
          )}

          {showTab === 'heatmap' && <HeatmapView studentList={studentList} />}
        </div>
      </div>
    </div>
  );
}

function FlippedClassroomApp() {

  const [isGuest, setIsGuest]   = useState(false);
  const [isDark, setIsDark]     = useState(() => localStorage.getItem(CONFIG.STORAGE.darkMode) === 'true');

  const { lessons, loading: lessonsLoading, error: lessonsError, refetchLessons } = useLessons();

    document.documentElement.classList.toggle('dark', isDark);
