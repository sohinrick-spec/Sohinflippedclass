          <motion.div key="treport" initial={{opacity:0,x:50}} animate={{opacity:1,x:0}} exit={{opacity:0,x:-50}}
            className="w-full flex justify-center">
            {isTeacher(userName) ? (
              <TeacherLessonReportScreen
                lesson={activeLesson}
                allProgress={allProgress}
                registeredUsers={registeredUsers}
                onBack={() => setScreen('teacher_dashboard')}
              />
            ) : (
              <div className="glass-panel p-8 rounded-2xl shadow-xl text-center max-w-sm">
                <button onClick={() => setScreen('home')} className="bg-gray-600 text-white px-6 py-2 rounded-lg">返回</button>
              </div>
            )}
          </motion.div>
        )}

        {screen === 'assignment_admin' && (
          <motion.div key="aadmin" initial={{opacity:0,x:50}} animate={{opacity:1,x:0}} exit={{opacity:0,x:-50}}
            className="w-full flex justify-center">
            {isTeacher(userName) ? (
              <AssignmentAdminScreen
                userName={userName}
                onBack={() => setScreen('home')}
                refetchLessons={refetchLessons}
                lessons={lessons}
                allProgress={allProgress}
                registeredUsers={registeredUsers}
              />
            ) : (
              <div className="glass-panel p-8 rounded-2xl shadow-xl text-center max-w-sm">
                <button onClick={() => setScreen('home')} className="bg-gray-600 text-white px-6 py-2 rounded-lg">返回</button>
              </div>
            )}
          </motion.div>
        )}

      </AnimatePresence>
    </div>
  );
}

/* ============================================================================
 * 【區塊 13A】ASSIGNMENT ADMIN SCREEN
 * ============================================================================ */
function AssignmentAdminScreen({ userName, onBack, refetchLessons, lessons = [], allProgress = {}, registeredUsers = [] }) {
  const toast = useToast();
  const [activeTab, setActiveTab] = useState('create');
  const [creating, setCreating] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [topic, setTopic] = useState('必修部分');
  const [title, setTitle] = useState('');
  const [description, setDescription] = useState('');
  const [videoId, setVideoId] = useState('');
  const [dueDate, setDueDate] = useState('');
  const [estimatedMin, setEstimatedMin] = useState(10);
  const [targetForm, setTargetForm] = useState('All');
  const [videoSelection, setVideoSelection] = useState('');

  // 用於選擇影片的列表（包含所有歷史影片）
  const uniqueVideos = useMemo(() => {
    const seen = new Set();
    const list = [];
    if (Array.isArray(lessons)) {
      lessons.forEach(l => {
        if (l.videoId && !seen.has(l.videoId)) {
          seen.add(l.videoId);
          list.push({ videoId: l.videoId, title: l.title, topic: l.topic || '必修部分' });
        }
      });
    }
    return list;
  }, [lessons]);

  /* ★★★ 修復 2：只列出真實已派發任務 ★★★ */
  const lessonStats = useMemo(() => {
    if (!Array.isArray(lessons)) return [];
    const assignedOnly = lessons.filter(l => isAssignedLesson(l));
    return [...assignedOnly].reverse().map(l => {
      const progressMap = allProgress[l.id] || {};
      const studentRecords = Object.entries(progressMap);
      const startedCount = studentRecords.filter(([,p]) => (p.watchPct || 0) > 0).length;
      const completedCount = studentRecords.filter(([,p]) => p.completedAt || (p.watchPct >= 90)).length;

      const allKnown = new Set();
      Object.values(allProgress || {}).forEach(lp => Object.keys(lp).forEach(n => allKnown.add(n)));
      (registeredUsers || []).forEach(n => allKnown.add(n));
      const classmates = [...allKnown].filter(name => matchesTargetForm(l.targetForm, parseUserForm(name)));
      const notStarted = classmates.filter(name => !progressMap[name]);

      return { lesson: l, started: startedCount, completed: completedCount, progressMap, classmates, notStarted };
    });
  }, [lessons, allProgress, registeredUsers]);

  const handleVideoSelectChange = (e) => {
    const val = e.target.value;
    setVideoSelection(val);
    if (val === 'custom') {
      setVideoId(''); setTitle('');
    } else if (val !== '') {
      const idx = Number(val);
      const selectedVideo = uniqueVideos[idx];
      if (selectedVideo) {
        setVideoId(selectedVideo.videoId);
        setTitle(selectedVideo.title);
        setTopic(selectedVideo.topic);
      }
    } else {
      setVideoId(''); setTitle('');
    }
  };

  const handleEdit = (lesson) => {
    setEditingId(lesson.id);
    setTopic(lesson.topic || '必修部分');
    setTitle(lesson.title || '');
    setDescription(lesson.description || '');
    setVideoId(lesson.videoId || '');
    setDueDate(lesson.dueDate || '');
    setEstimatedMin(lesson.estimatedMin || 10);
    setTargetForm(lesson.targetForm || 'All');
    setVideoSelection('custom');
    setActiveTab('create');
  };

  const handleCancelEdit = () => {
    setEditingId(null);
    setTitle(''); setDescription(''); setVideoId(''); setVideoSelection('');
    setDueDate(''); setEstimatedMin(10); setTargetForm('All');
  };

  const handleUpdate = async () => {
    if (!title.trim()) return toast('請輸入任務標題', 'warning');
    if (!videoId.trim()) return toast('請輸入影片 ID', 'warning');
    if (!dueDate) return toast('請設定截止日期', 'warning');
    if (!isScriptConfigured()) return toast('⚠️ 未配置 Google Sheet', 'error');
    setCreating(true);
    const payload = {
      action: 'updateLesson',
      lessonId: editingId,
      lesson: {
        id: editingId, topic, title: title.trim(), description: description.trim(),
        videoId: videoId.trim(), dueDate, estimatedMin: Number(estimatedMin),
        targetForm: targetForm.trim() || 'All'
      },
      updatedBy: userName,
      updatedAt: new Date().toISOString()
    };
    try {
      const res = await fetch(CONFIG.GOOGLE_SCRIPT_URL, {
        method: 'POST', redirect: 'follow',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      let data = {};
      try { data = JSON.parse(await res.text()); } catch { data = { success: true }; }
      if (data.success || data.result === 'success' || data.message) {
        toast('✅ 任務更新成功！', 'success');
        handleCancelEdit();
        if (refetchLessons) await refetchLessons();
        setTimeout(() => { setActiveTab('status'); if (refetchLessons) refetchLessons(); }, 800);
      } else {
        toast(`更新失敗: ${data.error || JSON.stringify(data)}`, 'error');
      }
    } catch (e) {
      toast(`網絡錯誤: ${e.message}`, 'error');
    } finally {
      setCreating(false);
    }
  };

  /* ★★★ 修復 3：建立後立即同步寫入 Sheet 並 refetch ★★★ */
  const handleCreate = async () => {
    if (!title.trim()) return toast('請輸入或選擇任務標題', 'warning');
    if (!videoId.trim()) return toast('請輸入或選擇影片 ID', 'warning');
    if (!dueDate) return toast('派發任務必須設定截止日期', 'warning');

    setCreating(true);
    const lessonId = `lesson_${Date.now()}`;
    const payload = {
      action: 'createLesson',
      lesson: {
        id: lessonId, topic, title: title.trim(), description: description.trim(),
        videoId: videoId.trim(), dueDate, estimatedMin: Number(estimatedMin),
        targetForm: targetForm.trim() || 'All'
      },
      createdBy: userName,
      createdAt: new Date().toISOString()
    };

    if (!isScriptConfigured()) {
      toast('⚠️ 未配置 Google Sheet，無法跨設備同步', 'error');
      setCreating(false);
      return;
    }

    try {
      const res = await fetch(CONFIG.GOOGLE_SCRIPT_URL, {
        method: 'POST', redirect: 'follow',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });

      let data = {};
      try {
        const text = await res.text();
        data = JSON.parse(text);
      } catch { data = { success: true }; }

      if (data.success || data.result === 'success' || data.message) {
        toast('🎉 任務發佈成功！已同步至 Google Sheet', 'success');
        setTitle(''); setDescription(''); setVideoId(''); setVideoSelection('');
        setDueDate(''); setEstimatedMin(10); setTargetForm('All');
        // 立即刷新並切換至已派發 tab
        if (refetchLessons) await refetchLessons();
        setTimeout(() => {
          setActiveTab('status');
          if (refetchLessons) refetchLessons();
        }, 800);
      } else {
        toast(`發佈失敗: ${data.error || JSON.stringify(data)}`, 'error');
      }
    } catch (e) {
      toast(`網絡錯誤: ${e.message}`, 'error');
    } finally {
      setCreating(false);
    }
  };

  const handleDelete = async (lessonId, lessonTitle) => {
    if (!window.confirm(`確定要刪除「${lessonTitle}」？\n此操作不可復原。`)) return;
    if (!isScriptConfigured()) return toast('⚠️ 未配置 Google Sheet', 'error');
    setCreating(true);
    try {
      const res = await fetch(CONFIG.GOOGLE_SCRIPT_URL, {
        method: 'POST', redirect: 'follow',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'deleteLesson', lessonId, deletedBy: userName, deletedAt: new Date().toISOString() })
      });
      let data = {};
      try { data = JSON.parse(await res.text()); } catch { data = { success: true }; }
      if (data.success || data.result === 'success' || data.message) {
        toast('🗑️ 任務已刪除', 'success');
        if (refetchLessons) await refetchLessons();
      } else {
        toast(`刪除失敗: ${data.error || JSON.stringify(data)}`, 'error');
      }
    } catch (e) {
      toast(`網絡錯誤: ${e.message}`, 'error');
    } finally {
      setCreating(false);
    }
  };

  return (
    <div className="w-full max-w-xl">
      <div className="glass-panel rounded-3xl shadow-xl overflow-hidden flex flex-col" style={{ maxHeight: '94vh' }}>

        <div className="hero-gradient p-5 text-white relative flex-shrink-0">
          <div className="flex items-center gap-3 relative">
            <button onClick={onBack}
              className="w-9 h-9 rounded-full bg-white/20 backdrop-blur flex items-center justify-center hover:bg-white/30">
              <i className="fas fa-arrow-left"></i>
            </button>
            <div>
              <h2 className="font-bold text-lg">
                <i className="fas fa-bullhorn mr-2"></i>任務管理中心
              </h2>
              <p className="text-xs text-white/80">建立與追蹤已派發任務（跨設備同步）</p>
            </div>
          </div>
        </div>

        <div className="px-5 pt-4 pb-2 flex-shrink-0">
          <div className="flex bg-gray-100 dark:bg-gray-700 p-1 rounded-xl">
            <button onClick={() => setActiveTab('create')}
              className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${activeTab === 'create' ? 'bg-white dark:bg-gray-600 text-indigo-600 dark:text-indigo-300 shadow-sm' : 'text-gray-500'}`}>
              <i className="fas fa-plus-circle mr-1"></i>發佈新任務
            </button>
            <button onClick={() => setActiveTab('status')}
              className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${activeTab === 'status' ? 'bg-white dark:bg-gray-600 text-indigo-600 dark:text-indigo-300 shadow-sm' : 'text-gray-500'}`}>
              <i className="fas fa-chart-pie mr-1"></i>已派發 ({lessonStats.length})
            </button>
          </div>
        </div>

        <div className="flex-1 overflow-y-auto custom-scrollbar p-5">
          {activeTab === 'create' ? (
            <div className="space-y-4">
              <div className="p-3 bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-xl text-xs text-blue-700 dark:text-blue-300 flex items-start gap-2">
                <i className="fas fa-cloud-upload-alt mt-0.5"></i>
                <span>所有發佈的任務將即時同步至 Google Sheet，所有設備（包括學生手機/電腦）均會自動載入。</span>
              </div>

              <div>
                <label className="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5">
                  <i className="fas fa-film text-indigo-500 mr-1"></i>選擇教學影片
                </label>
                <select value={videoSelection} onChange={handleVideoSelectChange}
                  className="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100 font-medium text-sm">
                  <option value="">-- 請選擇影片 --</option>
                  {uniqueVideos.map((vid, idx) => (
                    <option key={idx} value={idx}>{vid.title}</option>
                  ))}
                  <option value="custom">➕ 手動輸入全新 YouTube 影片...</option>
                </select>
              </div>

              {(videoSelection === 'custom' || uniqueVideos.length === 0) && (
                <div className="p-3 bg-gray-50 dark:bg-gray-900/50 rounded-xl border border-gray-200 dark:border-gray-700">
                  <label className="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5">YouTube 影片 ID</label>
                  <input type="text" value={videoId} onChange={e => setVideoId(e.target.value)}
                    placeholder="例如：dQw4w9WgXcQ"
                    className="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100 text-sm" />
                </div>
              )}

              <div>
                <label className="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5">任務標題</label>
                <input type="text" value={title} onChange={e => setTitle(e.target.value)}
                  placeholder="選取影片後會自動填入"
                  className="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100 text-sm" />
              </div>

              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5">單元主題</label>
                  <select value={topic} onChange={e => setTopic(e.target.value)}
                    className="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100 text-sm">
                    <option value="必修部分">必修部分</option>
                    <option value="E1 人體生理學">E1 人體生理學</option>
                    <option value="E2 生態學">E2 生態學</option>
                    <option value="E3 微生物與生物技術">E3 微生物與生物技術</option>
                    <option value="E4 生物技術導論">E4 生物技術導論</option>
                  </select>
                </div>
                <div>
                  <label className="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5">預計時長 (分鐘)</label>
                  <input type="number" value={estimatedMin} onChange={e => setEstimatedMin(e.target.value)}
                    className="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100 text-sm" />
                </div>
              </div>

              <div>
                <label className="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5">任務說明</label>
                <textarea value={description} onChange={e => setDescription(e.target.value)}
                  placeholder="請同學注意觀看重點..."
                  className="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100 h-20 resize-none text-sm" />
              </div>

              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5">派發班級</label>
                  <select value={targetForm} onChange={e => setTargetForm(e.target.value)}
                    className="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100 text-sm">
                    <option value="All">全體</option>
                    <optgroup label="── 按年級 ──">
                      <option value="4">中四（全部班別）</option>
                      <option value="5">中五（全部班別）</option>
                      <option value="6">中六（全部班別）</option>
                    </optgroup>
                    <optgroup label="── 中四班別 ──">
                      <option value="4A">4A班</option>
                      <option value="4B">4B班</option>
                      <option value="4C">4C班</option>
                      <option value="4D">4D班</option>
                    </optgroup>
                    <optgroup label="── 中五班別 ──">
                      <option value="5A">5A班</option>
                      <option value="5B">5B班</option>
                      <option value="5C">5C班</option>
                      <option value="5D">5D班</option>
                    </optgroup>
                    <optgroup label="── 中六班別 ──">
                      <option value="6A">6A班</option>
                      <option value="6B">6B班</option>
                      <option value="6C">6C班</option>
                      <option value="6D">6D班</option>
                    </optgroup>
                  </select>
                </div>
                <div>
                  <label className="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5">
                    截止日期 <span className="text-red-500">*</span>
                  </label>
                  <input type="date" value={dueDate} onChange={e => setDueDate(e.target.value)}
                    className="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100 text-sm" />
                </div>
              </div>

              {editingId && (
                <div className="p-3 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800 rounded-xl text-xs text-amber-700 dark:text-amber-300 flex items-center justify-between">
                  <span><i className="fas fa-pen mr-1"></i>正在編輯已發佈任務</span>
                  <button onClick={handleCancelEdit} className="text-amber-500 hover:text-amber-700 font-bold">取消編輯</button>
                </div>
              )}
              <button onClick={editingId ? handleUpdate : handleCreate} disabled={creating}
                className={`w-full py-3 rounded-xl font-bold text-white shadow-lg transition-all flex items-center justify-center gap-2 ${
                  creating ? 'bg-gray-400' : editingId
                    ? 'bg-gradient-to-r from-amber-500 to-orange-500 hover:scale-[1.02]'
                    : 'bg-gradient-to-r from-indigo-500 to-purple-600 hover:scale-[1.02]'
                }`}>
                {creating
                  ? <><i className="fas fa-spinner fa-spin"></i>{editingId ? '更新中...' : '發佈中...'}</>
                  : editingId
                    ? <><i className="fas fa-save"></i>確認更新任務</>
                    : <><i className="fas fa-paper-plane"></i>確認發佈任務</>}
              </button>
            </div>
          ) : (
            <AssignedLessonsView lessonStats={lessonStats} onEdit={handleEdit} onDelete={handleDelete} />
          )}
        </div>
      </div>
    </div>
  );
}

function AssignedLessonCard({ lesson, started, completed, progressMap, classmates, notStarted, onEdit, onDelete }) {

  const totalQ = lesson.questions?.length || 0;
  const studentList = Object.entries(progressMap)
    .map(([name, p]) => ({ name, ...p }))
    .sort((a,b) => (b.watchPct||0) - (a.watchPct||0));

  const totalCount = started + notStarted.length;
  const completionRate = totalCount > 0 ? Math.round((completed / totalCount) * 100) : 0;

  return (
    <div className="rounded-2xl border border-gray-100 dark:border-gray-700 bg-white dark:bg-gray-800 shadow-sm overflow-hidden card-elevation">
      <div className="p-4">
        <div className="flex justify-between items-start gap-2 mb-2">
          <div className="min-w-0 flex-1">
            <div className="flex items-center gap-1.5 flex-wrap mb-1">
              <span className="text-[10px] bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-300 px-2 py-0.5 rounded-md font-bold">
                {lesson.topic}
              </span>
              {lesson.targetForm && lesson.targetForm !== 'All' && (
                <span className="text-[10px] bg-amber-100 dark:bg-amber-900/50 text-amber-700 dark:text-amber-300 px-2 py-0.5 rounded-md font-bold">
                  <i className="fas fa-users mr-0.5"></i>{lesson.targetForm}
                </span>
              )}
              {lesson.dueDate && (
                <span className={`text-[10px] px-2 py-0.5 rounded-md font-medium ${
                  isOverdue(lesson.dueDate)
                    ? 'text-red-500 bg-red-50 dark:bg-red-900/20'
                    : 'text-gray-400 bg-gray-50 dark:bg-gray-900'
                }`}>
                  截止: {lesson.dueDate}
                </span>
              )}
            </div>
            <h3 className="font-bold text-gray-800 dark:text-gray-100 text-sm line-clamp-1">{lesson.title}</h3>

          <div className="text-right flex-shrink-0 flex flex-col items-end gap-1">

              {completionRate}%
            </div>
            <div className="text-[9px] text-gray-400 -mt-1">完成率</div>
            <div className="flex gap-1 mt-1">
              {onEdit && (
                <button onClick={(e) => { e.stopPropagation(); onEdit(lesson); }}
                  className="text-[10px] px-2 py-1 rounded-lg bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-300 font-bold hover:bg-indigo-100 dark:hover:bg-indigo-900/50 transition-colors flex items-center gap-1">
                  <i className="fas fa-pen text-[9px]"></i>編輯
                </button>
              )}
              {onDelete && (
                <button onClick={(e) => { e.stopPropagation(); onDelete(lesson.id, lesson.title); }}
                  className="text-[10px] px-2 py-1 rounded-lg bg-red-50 dark:bg-red-900/30 text-red-500 dark:text-red-400 font-bold hover:bg-red-100 dark:hover:bg-red-900/50 transition-colors flex items-center gap-1">
                  <i className="fas fa-trash text-[9px]"></i>刪除
                </button>
              )}
            </div>
          </div>
        </div>

        <div className="grid grid-cols-3 gap-2 mb-2.5">
          <div className="bg-blue-50 dark:bg-blue-900/20 rounded-lg p-2 text-center">
            <div className="text-[10px] text-blue-500 font-medium">已點開</div>
            <div className="text-base font-extrabold text-blue-600 dark:text-blue-400">{started}</div>
          </div>
          <div className="bg-green-50 dark:bg-green-900/20 rounded-lg p-2 text-center">
            <div className="text-[10px] text-green-500 font-medium">已完成</div>
            <div className="text-base font-extrabold text-green-600 dark:text-green-400">{completed}</div>
          </div>
          <div className="bg-red-50 dark:bg-red-900/20 rounded-lg p-2 text-center">
            <div className="text-[10px] text-red-500 font-medium">未點開</div>
            <div className="text-base font-extrabold text-red-500 dark:text-red-400">{notStarted.length}</div>
          </div>
        </div>

        {totalCount > 0 && (
          <div className="mb-2.5">
            <div className="h-2 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
              <div className="h-full bg-gradient-to-r from-green-400 to-emerald-500 rounded-full transition-all"
                   style={{ width: `${completionRate}%` }} />
            </div>
          </div>
        )}

        <button onClick={() => setExpanded(e => !e)}
          className="w-full text-xs py-1.5 rounded-lg bg-gray-50 dark:bg-gray-700 text-gray-500 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 hover:text-indigo-600 transition-all font-bold flex items-center justify-center gap-1">
          <i className={`fas fa-chevron-${expanded ? 'up' : 'down'} text-[10px]`}></i>
          {expanded ? '收起詳情' : `查看詳細追蹤 (${studentList.length + notStarted.length} 人)`}
        </button>
      </div>

      {expanded && (
        <div className="border-t border-gray-100 dark:border-gray-700 divide-y divide-gray-50 dark:divide-gray-700/50">
          {studentList.length > 0 && (
            <div className="p-3">
              <p className="text-[11px] font-bold text-gray-400 mb-2 flex items-center gap-1">
                <i className="fas fa-play-circle text-blue-400"></i>已點開 ({studentList.length})
              </p>
              <div className="space-y-1.5">
                {studentList.map(s => {
                  const answered = s.answers ? Object.keys(s.answers).length : 0;
                  const statusIcon = s.completedAt ? '✅' : s.watchPct >= 80 ? '▶️' : '👁️';
                  const statusColor = s.completedAt
                    ? 'border-green-200 dark:border-green-800 bg-green-50/50 dark:bg-green-900/10'
                    : 'border-gray-100 dark:border-gray-700/50 bg-white dark:bg-gray-800/50';
                  return (
                    <div key={s.name} className={`rounded-lg border px-3 py-2 ${statusColor}`}>
                      <div className="flex items-center gap-2">
                        <span className="text-sm">{statusIcon}</span>
                        <span className="text-xs font-bold text-gray-700 dark:text-gray-200 flex-1 truncate">{shortenName(s.name)}</span>
                        <div className="flex items-center gap-1.5 flex-shrink-0">
                          <div className="w-14 h-1.5 bg-gray-200 dark:bg-gray-600 rounded-full overflow-hidden">
                            <div className={`h-full rounded-full bg-gradient-to-r ${watchPctGradient(s.watchPct)}`} style={{ width: fmtPct(s.watchPct) }} />
                          </div>
                          <span className={`text-[10px] font-bold w-8 text-right ${watchPctColor(s.watchPct)}`}>{fmtPct(s.watchPct)}</span>
                          {totalQ > 0 && (
                            <span className={`text-[10px] px-1.5 py-0.5 rounded font-bold ${answered >= totalQ ? 'bg-green-100 dark:bg-green-900/50 text-green-700' : 'bg-gray-100 dark:bg-gray-700 text-gray-500'}`}>
                              {answered}/{totalQ}
                            </span>
                          )}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {notStarted.length > 0 && (
            <div className="p-3 bg-red-50/30 dark:bg-red-900/10">
              <p className="text-[11px] font-bold text-red-400 mb-2 flex items-center gap-1">
                <i className="fas fa-eye-slash"></i>未點開 ({notStarted.length})
              </p>
              <div className="flex flex-wrap gap-1.5">
                {notStarted.map(name => (
                  <span key={name} className="text-[11px] bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 px-2 py-0.5 rounded-full font-medium border border-red-200 dark:border-red-800/50">
                    {shortenName(name)}
                  </span>
                ))}
              </div>
            </div>
          )}

          {studentList.length === 0 && notStarted.length === 0 && (
            <div className="p-4 text-center text-xs text-gray-400">
              <i className="fas fa-hourglass-half mr-1"></i>尚未有學生開始此任務
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function AssignedLessonsView({ lessonStats, onEdit, onDelete }) {
  const [gradeFilter, setGradeFilter] = useState('all');

  const GRADE_CONFIG = [
    { key: 'all',  label: '全部', icon: 'fa-list' },
    { key: '4',    label: '中四', icon: 'fa-4' },
    { key: '5',    label: '中五', icon: 'fa-5' },
    { key: '6',    label: '中六', icon: 'fa-6' },
    { key: 'all_grade', label: '全體', icon: 'fa-users' },
  ];

  const filteredStats = useMemo(() => {
    if (gradeFilter === 'all') return lessonStats;
    if (gradeFilter === 'all_grade') {
      return lessonStats.filter(s => {
        const tf = (s.lesson.targetForm || 'All').trim().toUpperCase();
        return tf === '' || tf === 'ALL';
      });
    }
    return lessonStats.filter(s => {
      const tf = (s.lesson.targetForm || '').trim();
      if (!tf || tf.toUpperCase() === 'ALL') return false;
      const g = tf.match(/^([4-6])/);
      return g && g[1] === gradeFilter;
    });
  }, [lessonStats, gradeFilter]);

  const gradeCounts = useMemo(() => {
    const counts = { '4': 0, '5': 0, '6': 0, 'all_grade': 0 };
    lessonStats.forEach(s => {
      const tf = (s.lesson.targetForm || 'All').trim().toUpperCase();
      if (!tf || tf === 'ALL') { counts['all_grade']++; return; }
      const g = tf.match(/^([4-6])/);
      if (g) counts[g[1]] = (counts[g[1]] || 0) + 1;
    });
    return counts;
  }, [lessonStats]);

  if (lessonStats.length === 0) {
    return <EmptyState icon="📭" title="尚無已派發任務" subtitle="切換到「發佈新任務」分頁開始建立。" />;
  }

  return (
    <div className="space-y-4">
      <div className="flex gap-1.5 flex-wrap">
        {GRADE_CONFIG.map(g => {
          const count = g.key === 'all' ? lessonStats.length : gradeCounts[g.key] || 0;
          if (g.key !== 'all' && count === 0) return null;
          return (
            <button key={g.key}
              onClick={() => setGradeFilter(g.key)}
              className={`flex items-center gap-1 text-xs px-3 py-1.5 rounded-full font-bold transition-all border ${
                gradeFilter === g.key
                  ? 'bg-indigo-600 text-white border-indigo-600 shadow'
                  : 'bg-white dark:bg-gray-800 text-gray-500 border-gray-200 dark:border-gray-600'
              }`}>
              <i className={`fas ${g.icon} text-[10px]`}></i>
              {g.label}
              <span className={`${gradeFilter === g.key ? 'bg-white/20' : 'bg-gray-100 dark:bg-gray-700'} px-1.5 rounded-full text-[10px] font-bold`}>
                {count}
              </span>
            </button>
          );
        })}
      </div>

      {filteredStats.length === 0 ? (
        <div className="text-center py-8 text-gray-400 text-sm">
          <i className="fas fa-filter mr-2"></i>此年級暫無已派發任務
        </div>
      ) : (
        filteredStats.map(({ lesson, started, completed, progressMap, classmates, notStarted }) => (
          <AssignedLessonCard key={lesson.id}
            lesson={lesson} started={started} completed={completed}
            progressMap={progressMap} classmates={classmates} notStarted={notStarted}
            onEdit={onEdit} onDelete={onDelete} />
        ))
      )}
    </div>
  );
}

  return (
    <ToastProvider>
      <FlippedClassroomApp />
    </ToastProvider>
  );
}

root.render(<Root />);
