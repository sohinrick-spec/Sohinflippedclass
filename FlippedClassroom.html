<body>
<div id="root"></div>

<script type="text/babel" data-presets="react,env">

/* ============================================================================
 * 【版本檢查系統】
 * ============================================================================ */
const APP_VERSION       = "2026.05.16.fc.v3";
const VERSION_CHECK_URL = "./version.json";
const VERSION_CHECK_INTERVAL = 5 * 60 * 1000;

window.__APP_STATE__ = { gameState: 'home' };

async function checkForUpdate() {
  try {
    const res = await fetch(`${VERSION_CHECK_URL}?t=${Date.now()}`, { cache:'no-store' });
    if (!res.ok) return;
    const data = await res.json();
    if (data.version && data.version !== APP_VERSION) showUpdatePrompt(data.version, data.releaseNote);
  } catch(e) { /* silent */ }
}

function showUpdatePrompt(newVersion, releaseNote) {
  if (document.getElementById('app-update-banner')) return;
  const banner = document.createElement('div');
  banner.id = 'app-update-banner';
  banner.style.cssText = `
    position:fixed;top:0;left:0;right:0;z-index:99999;
    background:linear-gradient(90deg,#6366f1,#a855f7);
    color:white;padding:12px 16px;
    font-family:'Noto Sans TC',sans-serif;font-size:14px;
    box-shadow:0 4px 14px rgba(0,0,0,0.25);
    display:flex;align-items:center;justify-content:center;
    gap:12px;flex-wrap:wrap;animation:slideDownBanner 0.4s ease-out;
  `;
  banner.innerHTML = `
    <span style="font-weight:600;">🎉 發現新版本 (${newVersion})！${releaseNote ? '📝 '+releaseNote : ''}</span>
    <div style="display:flex;gap:8px;flex-shrink:0;">
      <button id="fc-update-btn" style="background:white;color:#6366f1;border:none;padding:6px 16px;border-radius:6px;font-weight:bold;cursor:pointer;">立即更新</button>
      <button id="fc-update-later" style="background:transparent;color:white;border:1px solid rgba(255,255,255,0.6);padding:6px 12px;border-radius:6px;cursor:pointer;">關閉</button>
    </div>
  `;
  document.body.appendChild(banner);
  document.getElementById('fc-update-btn').onclick    = () => location.reload(true);
  document.getElementById('fc-update-later').onclick = () => banner.remove();
}

setTimeout(checkForUpdate, 30000);
setInterval(checkForUpdate, VERSION_CHECK_INTERVAL);
document.addEventListener('visibilitychange', () => { if (!document.hidden) checkForUpdate(); });

/* ============================================================================
 * 【區塊 1】CONFIG
 * ============================================================================ */
const CONFIG = {
  APP_NAME:              '軒軒翻轉課室',
  APP_SUBTITLE:          '觀看影片，掌握知識',
  // ⚠️ 填入你的 Google Apps Script Web App URL
  GOOGLE_SCRIPT_URL:     'https://script.google.com/macros/s/AKfycbzusmHGsYA0NQpSwzWYhlGM1pLqpopyNX_Gdhfz_W59Vg-lwkDlH9WOyDrGOujcY-yhuQ/exec',
  // ⚠️ 填入實際的 Google OAuth Client ID
  GOOGLE_CLIENT_ID:      '1009693128680-5g65g888ss72cqr8dkdl84ci77rc7qv1.apps.googleusercontent.com',
  ALLOWED_EMAIL_DOMAIN:  '@tcss.edu.hk',
  TEACHER_NAMES:         ['Chi Hin So'],
  VIDEO_UNLOCK_THRESHOLD:  80,
  VIDEO_COMPLETE_THRESHOLD: 90,
  STORAGE: {
    username: 'fc_username',
    darkMode:  'fc_dark_mode',
    progress:  'fc_progress_'
  }
};

/* ============================================================================
 * 【區塊 2】課題資料已移至 Google Sheet 管理
 * ============================================================================
 *
 * 課題設定位置：Google Sheet → "Lessons" 及 "Questions" 工作表
 *
 * Lessons 工作表欄位：
 *   id | title | topic | description | videoId | dueDate | estimatedMin
 *
 * Questions 工作表欄位：
 *   lessonId | id | type | text | options | answer
 *   - MCQ: options 用 | 分隔，e.g. "A|B|C|D"；answer 填 index（0起）
 *   - fill: options 留空；answer 填參考答案文字
 *
 * ============================================================================ */

/* ============================================================================
 * 【區塊 3】UTILITIES
 * ============================================================================ */
const {
  useState, useEffect, useMemo, useRef,
  useCallback, useContext, createContext, memo
} = React;
const MotionLib = window.Motion || { motion: { div: 'div', span: 'span' }, AnimatePresence: ({children}) => children };
const { motion, AnimatePresence } = MotionLib;

function getHKDateString(dateObj) {
  const base = dateObj || new Date();
  const utc  = base.getTime() + base.getTimezoneOffset() * 60000;
  const hk   = new Date(utc + 3600000 * 8);
  const y = hk.getFullYear();
  const m = String(hk.getMonth() + 1).padStart(2,'0');
  const d = String(hk.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

function isDueSoon(dateStr) {
  if (!dateStr) return false;
  const today = new Date(getHKDateString());
  const due   = new Date(dateStr);
  const diff  = Math.round((due - today) / (1000 * 60 * 60 * 24));
  return diff >= 0 && diff <= 3;
}

function isOverdue(dateStr) {
  if (!dateStr) return false;
  return getHKDateString() > dateStr;
}

// 解析用戶名格式：「WAN YU FUNG (25-26) 5A28」→ 顯示名 / 班別 / 年級
function parseUsername(fullName) {
  if (!fullName) return { displayName: '', form: null, grade: null, number: null };
  const s = String(fullName).trim();
  // 格式1：NAME (YY-YY) 5A28   e.g. "WAN YU FUNG (25-26) 5A28"
  const m1 = s.match(/^(.+?)\s*\(\d{2}-\d{2}\)\s*([4-6][A-Z])(\d+)\s*$/i);
  if (m1) {
    return { displayName: m1[1].trim(), form: m1[2].toUpperCase(), grade: m1[2][0], number: m1[3] };
  }
  // 格式2：5A28 NAME (YY-YY)   舊格式備援
  const m2 = s.match(/^([4-6][A-Z])(\d+)\s+(.+?)\s*(?:\(\d{2}-\d{2}\))?\s*$/i);
  if (m2) {
    return { displayName: m2[3].trim(), form: m2[1].toUpperCase(), grade: m2[1][0], number: m2[2] };
  }
  return { displayName: s, form: null, grade: null, number: null };
}

function shortenName(fullName) {
  if (!fullName) return '';
  return parseUsername(String(fullName)).displayName || String(fullName).trim();
}

// 取得學生班別（如 "5A"），供任務篩選用
function parseUserForm(fullName) {
  return parseUsername(fullName).form; // e.g. "5A" or null
}

// 判斷該學生班別是否符合任務的派發對象
function matchesTargetForm(targetForm, userForm) {
  if (!targetForm || targetForm.trim() === '' || targetForm.trim().toUpperCase() === 'ALL') return true;
  if (!userForm) return true; // 無法判斷班別→預設顯示
  const tf = targetForm.trim().toUpperCase();
  const uf = userForm.trim().toUpperCase();
  if (tf === uf) return true; // 完全符合，例如 "5A" === "5A"
  // 只指定年級：「5」「F5」「中五」→ 符合所有 5X 班
  const gm = tf.match(/^(?:[F中]?)([4-6])$/i);
  if (gm && uf[0] === gm[1]) return true;
  // 逗號分隔多班：「5A,5B」
  if (tf.includes(',')) {
    return tf.split(',').map(x => x.trim()).some(t => t === uf);
  }
  return false;
}

function normalizeNameForMatch(name) {
  if (!name) return '';
  return shortenName(name).toLowerCase().trim().split(/\s+/).filter(Boolean).sort().join(' ');
}

const TEACHER_NORMALIZED_SET = new Set(CONFIG.TEACHER_NAMES.map(normalizeNameForMatch));

function isTeacher(name) {
  if (!name || name === '訪客 (未登入)') return false;
  const n = normalizeNameForMatch(name);
  return !!n && TEACHER_NORMALIZED_SET.has(n);
}

function decodeJwtResponse(token) {
  const base64 = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');  // ← 加 g
  return JSON.parse(decodeURIComponent(
    atob(base64).split('').map(c => '%' + ('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')
  ));
}

function loadYouTubeAPI() {
  return new Promise(resolve => {
    if (window.YT && window.YT.Player) { resolve(window.YT); return; }
    const prev = window.onYouTubeIframeAPIReady;
    window.onYouTubeIframeAPIReady = () => {
      if (prev) prev();
      resolve(window.YT);
    };
    if (!document.querySelector('script[src*="youtube.com/iframe_api"]')) {
      const s = document.createElement('script');
      s.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(s);
    }
  });
}

function fmtPct(pct) { return `${Math.round(pct || 0)}%`; }

function watchPctColor(pct) {
  if (!pct || pct < 30)  return 'text-red-500 dark:text-red-400';
  if (pct < CONFIG.VIDEO_COMPLETE_THRESHOLD) return 'text-yellow-500 dark:text-yellow-400';
  return 'text-green-500 dark:text-green-400';
}

function watchPctBg(pct) {
  if (!pct || pct < 30)  return 'bg-red-500';
  if (pct < CONFIG.VIDEO_COMPLETE_THRESHOLD) return 'bg-yellow-500';
  return 'bg-green-500';
}

function isScriptConfigured() {
  const url = CONFIG.GOOGLE_SCRIPT_URL || '';
  return url.length > 0 &&
         !url.includes('YOUR_SCRIPT') &&
         !url.includes('PLACEHOLDER') &&
         url.startsWith('https://script.google.com/');
}

function loadLocalProgress(lessonId, studentName) {
  if (!lessonId || !studentName || studentName === '訪客 (未登入)') return null;
  try {
    const key = CONFIG.STORAGE.progress + lessonId + '_' + studentName;
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function saveLocalProgress(lessonId, studentName, data) {
  if (!lessonId || !studentName || studentName === '訪客 (未登入)') return;
  try {
    const key = CONFIG.STORAGE.progress + lessonId + '_' + studentName;
    localStorage.setItem(key, JSON.stringify({ ...data, savedAt: new Date().toISOString() }));
  } catch { /* ignore quota errors */ }
}

/* ============================================================================
 * 【區塊 4】TOAST SYSTEM
 * ============================================================================ */
const TOAST_STYLE = {
  info:    { bg:'bg-indigo-500', border:'border-indigo-600', icon:'fa-circle-info' },
  success: { bg:'bg-green-500',  border:'border-green-600',  icon:'fa-circle-check' },
  warning: { bg:'bg-yellow-500', border:'border-yellow-600', icon:'fa-triangle-exclamation' },
  error:   { bg:'bg-red-500',    border:'border-red-600',    icon:'fa-circle-xmark' }
};

const ToastContext = createContext(null);

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const addToast = useCallback((message, type = 'info', duration = 3000) => {
    const id = Date.now() + Math.random();
    setToasts(prev => [...prev.slice(-4), { id, message, type, duration }]);
    if (duration > 0) setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), duration);
  }, []);
  return (
    <ToastContext.Provider value={addToast}>
      {children}
      <div className="fixed top-16 right-4 z-[9999] flex flex-col gap-2 pointer-events-none" style={{ maxWidth: '320px' }}>
        <AnimatePresence>
          {toasts.map(t => {
            const s = TOAST_STYLE[t.type] || TOAST_STYLE.info;
            return (
              <motion.div key={t.id}
                initial={{ opacity:0, x:60, scale:0.9 }}
                animate={{ opacity:1, x:0,  scale:1 }}
                exit={{   opacity:0, x:60,  scale:0.9 }}
                className={`${s.bg} ${s.border} border-l-4 text-white px-4 py-3 rounded-xl shadow-2xl pointer-events-auto flex items-center gap-2 text-sm`}>
                <i className={`fas ${s.icon} flex-shrink-0`}></i>
                <span>{t.message}</span>
              </motion.div>
            );
          })}
        </AnimatePresence>
      </div>
    </ToastContext.Provider>
  );
}

function useToast() { return useContext(ToastContext); }

/* ============================================================================
 * 【區塊 5】GOOGLE SIGN-IN HOOK
 * ============================================================================ */
function useGoogleSignIn(userName, setUserName) {
  const attemptRef = useRef(0);
  useEffect(() => {
    if (userName) { document.body.classList.add('logged-in'); return; }
    document.body.classList.remove('logged-in');
    const maxAttempts = 60;
    let timer = null;
    function tryRender() {
      attemptRef.current++;
      if (!window.google || !window.google.accounts || !window.google.accounts.id) {
        if (attemptRef.current < maxAttempts) timer = setTimeout(tryRender, 300);
        return;
      }
      const el = document.getElementById('googleSignInDiv');
      if (!el) { if (attemptRef.current < maxAttempts) timer = setTimeout(tryRender, 300); return; }
      try {
        window.google.accounts.id.initialize({
          client_id: CONFIG.GOOGLE_CLIENT_ID,
          callback: (response) => {
            try {
              const payload = decodeJwtResponse(response.credential);
              const email   = payload.email || '';
              const name    = payload.name  || email;
              if (!CONFIG.ALLOWED_EMAIL_DOMAIN || email.endsWith(CONFIG.ALLOWED_EMAIL_DOMAIN)) {
                setUserName(name);
                localStorage.setItem(CONFIG.STORAGE.username, name);
              } else {
                alert(`請使用學校電郵 (${CONFIG.ALLOWED_EMAIL_DOMAIN}) 登入`);
              }
            } catch { alert('登入失敗，請重試'); }
          }
        });
        window.google.accounts.id.renderButton(el, { theme:'outline', size:'large', width: 300 });
      } catch { /* ignore */ }
    }
    timer = setTimeout(tryRender, 300);
    return () => { if (timer) clearTimeout(timer); };
  }, [userName, setUserName]);
}

/* ============================================================================
 * 【區塊 6A】useLessons — 從 Google Sheet (GAS) 載入課題資料
 * ============================================================================ */
function useLessons() {
  const [lessons, setLessons]     = useState([]);
  const [loading, setLoading]     = useState(true);
  const [error,   setError]       = useState(null);

  const fetchLessons = useCallback(async () => {
    setLoading(true);
    setError(null);

    if (!isScriptConfigured()) {
      setError('尚未設定 Google Script URL，請在 CONFIG.GOOGLE_SCRIPT_URL 填入 GAS 網址。');
      setLessons([]);
      setLoading(false);
      return;
    }

    try {
      const res  = await fetch(
        `${CONFIG.GOOGLE_SCRIPT_URL}?action=getLessons&t=${Date.now()}`
      );
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      if (data.error) throw new Error(data.error);
      setLessons(Array.isArray(data.lessons) ? data.lessons : []);
    } catch (e) {
      setError(`載入課題失敗：${e.message}`);
      setLessons([]);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { fetchLessons(); }, [fetchLessons]);

  return { lessons, loading, error, refetchLessons: fetchLessons };
}

/* ============================================================================
 * 【區塊 6B】useProgressData — 雲端（GAS）+ 本機 localStorage 雙軌儲存
 * ============================================================================ */
function useProgressData(userName) {
  const [allProgress, setAllProgress] = useState(null);
  const [loading, setLoading]         = useState(false);
  const [error, setError]             = useState(null);

  /* ── 從 GAS 或 localStorage 讀取進度 ── */
  const fetchProgress = useCallback(async () => {
    if (!userName || userName === '訪客 (未登入)') return;
    setLoading(true);
    setError(null);

    // 優先嘗試 GAS 雲端
    if (isScriptConfigured()) {
      try {
        const res  = await fetch(
          `${CONFIG.GOOGLE_SCRIPT_URL}?action=getProgress&t=${Date.now()}`
        );
        if (res.ok) {
          const data = await res.json();
          if (data.progress && !data.error) {
            setAllProgress(data.progress);
            setLoading(false);
            return;
          }
        }
      } catch (e) {
        /* GAS 失敗，降級到 localStorage */
      }
    }

    /* 降級：從 localStorage 讀取 */
    try {
      const result = {};
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!k || !k.startsWith(CONFIG.STORAGE.progress)) continue;
        const rest   = k.slice(CONFIG.STORAGE.progress.length);
        const sepIdx = rest.lastIndexOf('_');   // ← 改用 lastIndexOf
        if (sepIdx < 0) continue;
        const lessonId    = rest.slice(0, sepIdx);
        const studentName = rest.slice(sepIdx + 1);
        try {
          const val = JSON.parse(localStorage.getItem(k));
          if (!result[lessonId]) result[lessonId] = {};
          result[lessonId][studentName] = val;
        } catch { /* 略過損壞項目 */ }
      }
      setAllProgress(result);
    } catch (e) {
      setError(e.message);
    }
    setLoading(false);
  }, [userName]);

  /* ── 儲存進度（先存 localStorage，再上傳 GAS） ── */
  const submitProgress = useCallback(async (lessonId, progressObj) => {
    if (!userName || userName === '訪客 (未登入)') return;

    // 本機快速儲存
    saveLocalProgress(lessonId, userName, progressObj);

    // 上傳至 GAS（非阻塞）
    if (isScriptConfigured()) {
      fetch(CONFIG.GOOGLE_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' }, // GAS 需要 text/plain 避免 CORS preflight
        body: JSON.stringify({
          action:     'saveProgress',
          lessonId,
          student:    userName,
          watchPct:   progressObj.watchPct    || 0,
          answers:    progressObj.answers     || {},
          completedAt: progressObj.completedAt || '',
          startedAt:  progressObj.startedAt   || new Date().toISOString(),
        })
      }).catch(() => { /* 靜默失敗，本機已備份 */ });
    }

    // 更新本地快照
    setAllProgress(prev => {
      const next = { ...(prev || {}) };
      if (!next[lessonId]) next[lessonId] = {};
      next[lessonId][userName] = { ...progressObj };
      return next;
    });
  }, [userName]);

  useEffect(() => { fetchProgress(); }, [fetchProgress]);

  const getProgress = useCallback((lessonId, name = userName) => {
    if (allProgress && allProgress[lessonId] && allProgress[lessonId][name]) {
      return allProgress[lessonId][name];
    }
    return loadLocalProgress(lessonId, name || userName);
  }, [allProgress, userName]);

  return { allProgress, loading, error, submitProgress, getProgress, refetch: fetchProgress };
}

const ProgressRing = memo(function ProgressRing({ pct = 0, size = 48, strokeWidth = 4, label = '', className = '' }) {
  const r   = (size - strokeWidth * 2) / 2;
  const C   = 2 * Math.PI * r;
  const offset = C - (pct / 100) * C;
  const color = pct >= CONFIG.VIDEO_COMPLETE_THRESHOLD ? '#22c55e'
              : pct >= 30 ? '#eab308' : '#ef4444';
  return (
    <div className={`relative inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}>
      <svg width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#e5e7eb" strokeWidth={strokeWidth} />
        <circle cx={size/2} cy={size/2} r={r} fill="none"
          stroke={color} strokeWidth={strokeWidth} strokeLinecap="round"
          strokeDasharray={C} strokeDashoffset={offset}
          className="progress-ring-circle" />
      </svg>
      <span className="absolute text-[10px] font-bold" style={{ color }}>
        {label || `${Math.round(pct)}%`}
      </span>
    </div>
  );
});

function LessonStatusBadge({ status }) {
  const map = {
    not_started: { label:'未開始', cls:'bg-gray-100 text-gray-500 dark:bg-gray-700 dark:text-gray-400', icon:'fa-circle' },
    watching:    { label:'觀看中', cls:'bg-blue-100 text-blue-600 dark:bg-blue-900/50 dark:text-blue-300', icon:'fa-play-circle' },
    answering:   { label:'作答中', cls:'bg-purple-100 text-purple-600 dark:bg-purple-900/50 dark:text-purple-300', icon:'fa-pen-to-square' },
    completed:   { label:'已完成', cls:'bg-green-100 text-green-700 dark:bg-green-900/50 dark:text-green-300', icon:'fa-circle-check' },
    overdue:     { label:'已逾期', cls:'bg-red-100 text-red-600 dark:bg-red-900/50 dark:text-red-300', icon:'fa-clock' },
  };
  const s = map[status] || map.not_started;
  return (
    <span className={`inline-flex items-center gap-1 text-xs font-bold px-2 py-0.5 rounded-full ${s.cls}`}>
      <i className={`fas ${s.icon} text-[10px]`}></i>
      {s.label}
    </span>
  );
}

function LessonCard({ lesson, progress, onClick }) {
  const watchPct     = progress?.watchPct     || 0;
  const isCompleted  = !!progress?.completedAt;
  const questionsAnswered = progress?.answers ? Object.keys(progress.answers).length : 0;
  const totalQ = lesson.questions?.length || 0;

  let status = 'not_started';
  if (isCompleted) status = 'completed';
  else if (questionsAnswered > 0) status = 'answering';
  else if (watchPct > 0) status = 'watching';
  else if (lesson.dueDate && isOverdue(lesson.dueDate)) status = 'overdue';

  return (
    <motion.div
      whileHover={{ scale: 1.015 }}
      whileTap={{ scale: 0.985 }}
      onClick={onClick}
      className="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl p-4 shadow-sm hover:shadow-md transition-all cursor-pointer relative overflow-hidden"
    >
      <div className={`absolute left-0 top-0 bottom-0 w-1 rounded-l-2xl ${
        isCompleted ? 'bg-green-500' : watchPct > 0 ? 'bg-blue-500' : 'bg-gray-200 dark:bg-gray-600'
      }`} />

      <div className="pl-3 flex items-start justify-between gap-3">
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 mb-1 flex-wrap">
            <span className="text-xs bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-300 px-2 py-0.5 rounded-full font-bold">
              {lesson.topic}
            </span>
            <LessonStatusBadge status={status} />
            {lesson.dueDate && isDueSoon(lesson.dueDate) && !isCompleted && (
              <span className="text-xs bg-amber-100 dark:bg-amber-900/50 text-amber-700 dark:text-amber-300 px-2 py-0.5 rounded-full font-bold animate-pulse">
                <i className="fas fa-clock mr-1"></i>即將截止
              </span>
            )}
            {lesson.dueDate && isOverdue(lesson.dueDate) && !isCompleted && (
              <span className="text-xs bg-red-100 dark:bg-red-900/50 text-red-600 dark:text-red-300 px-2 py-0.5 rounded-full font-bold">
                <i className="fas fa-triangle-exclamation mr-1"></i>已逾期
              </span>
            )}
          </div>

          <h3 className="font-bold text-gray-800 dark:text-gray-100 text-base leading-snug truncate">{lesson.title}</h3>

          {lesson.description && (
            <p className="text-xs text-gray-500 dark:text-gray-400 mt-1 line-clamp-2">{lesson.description}</p>
          )}

          <div className="mt-2 flex items-center gap-3 text-xs text-gray-400 dark:text-gray-500">
            {lesson.estimatedMin > 0 && (
              <span><i className="fas fa-clock mr-1"></i>{lesson.estimatedMin} 分鐘</span>
            )}
            {totalQ > 0 && (
              <span>
                <i className="fas fa-question-circle mr-1"></i>
                {totalQ} 道題
                {questionsAnswered > 0 && <span className="text-indigo-500 dark:text-indigo-400 font-bold ml-1">（已答 {questionsAnswered}）</span>}
              </span>
            )}
            {lesson.dueDate && (
              <span className={isOverdue(lesson.dueDate) && !isCompleted ? 'text-red-400' : ''}>
                <i className="fas fa-calendar-alt mr-1"></i>截止 {lesson.dueDate}
              </span>
            )}
          </div>

          {watchPct > 0 && (
            <div className="mt-2">
              <div className="flex justify-between text-[10px] text-gray-400 dark:text-gray-500 mb-0.5">
                <span>影片觀看進度</span>
                <span className={`font-bold ${watchPctColor(watchPct)}`}>{fmtPct(watchPct)}</span>
              </div>
              <div className="h-1.5 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
                <div className={`h-full rounded-full transition-all duration-700 ${watchPctBg(watchPct)}`}
                     style={{ width: fmtPct(watchPct) }} />
              </div>
            </div>
          )}
        </div>

        <div className="flex flex-col items-center gap-1 flex-shrink-0">
          <ProgressRing pct={watchPct} size={52} strokeWidth={5} />
          <span className="text-[9px] text-gray-400 dark:text-gray-500">觀看</span>
        </div>
      </div>
    </motion.div>
  );
}

    let list = lessons;

    if (!teacher) {
      list = list.filter(l => matchesTargetForm(l.targetForm, userForm));

    }

      list = list.filter(l => !getProgress(l.id)?.completedAt);

      list = list.filter(l => !!getProgress(l.id)?.completedAt);

    return list;
  }, [lessons, search, filter, getProgress, teacher, userForm]);

  const completedCount = useMemo(() =>
    lessons.filter(l => !!getProgress(l.id)?.completedAt).length,
  [lessons, getProgress]);

  // === 新增：分類與下拉選單狀態 (開始) ===
  const [openTopics, setOpenTopics] = useState({});

  const toggleTopic = (topic) => {
    setOpenTopics(prev => ({
      ...prev,
      [topic]: !prev[topic]

  };

  const groupedLessons = useMemo(() => {
    if (!filteredLessons) return {};
    return filteredLessons.reduce((acc, lesson) => {
      const topic = (lesson.topic && lesson.topic.trim() !== '') ? lesson.topic : '未分類';
      if (!acc[topic]) acc[topic] = [];
      acc[topic].push(lesson);
      return acc;
    }, {});
  }, [filteredLessons]);
  // === 新增：分類與下拉選單狀態 (結束) ===

  // === 新增：將課題按照 1-30，接著 E1-E4 排序 ===
  const sortedTopicEntries = useMemo(() => {
    return Object.entries(groupedLessons).sort(([topicA], [topicB]) => {
      // 確保「未分類」排在最下方
      if (topicA === '未分類') return 1;
      if (topicB === '未分類') return -1;

      // 判斷是否為 E 開頭
      const aIsE = topicA.toUpperCase().startsWith('E');
      const bIsE = topicB.toUpperCase().startsWith('E');

      // 數字類排前面，E 類排後面
      if (aIsE && !bIsE) return 1; 
      if (!aIsE && bIsE) return -1; 

      // 提取並比較數字部分 (例如: 將 "E1" 轉為 1, 或 "1" 轉為 1)
      const numA = parseInt(topicA.toUpperCase().replace('E', ''), 10) || 0;
      const numB = parseInt(topicB.toUpperCase().replace('E', ''), 10) || 0;
      
      return numA - numB;
    });
  }, [groupedLessons]);

function LessonPlayerScreen({ lesson, userName, initialProgress, onSaveProgress, onBack }) {

  const [maxWatchPct, setMaxWatchPct]   = useState(initialProgress?.watchPct || 0);
  const [answers, setAnswers]           = useState(initialProgress?.answers || {});
  const [completedAt, setCompletedAt]   = useState(initialProgress?.completedAt || null);
  const [videoReady, setVideoReady]     = useState(false);
  const [isPlaying, setIsPlaying]       = useState(false);
  const [submitLoading, setSubmitLoading] = useState(false);

  const playerRef    = useRef(null);
  const trackTimer   = useRef(null);
  const containerRef = useRef(null);
  const watchedSecondsRef = useRef(new Set());
  const hasVideo     = lesson.videoId &&
                       lesson.videoId !== 'PLACEHOLDER_VIDEO_ID' &&
                       lesson.videoId !== 'YOUTUBE_VIDEO_ID_HERE' &&
                       String(lesson.videoId).trim() !== '';
  const questionsUnlocked = maxWatchPct >= CONFIG.VIDEO_UNLOCK_THRESHOLD;
  const totalQ  = lesson.questions?.length || 0;
  const answered = Object.keys(answers).length;
  // 若無題目，只要觀看達標即可提交
  const allAnswered = totalQ === 0
    ? (maxWatchPct >= CONFIG.VIDEO_COMPLETE_THRESHOLD)
    : (answered >= totalQ);

  useEffect(() => {
    if (!hasVideo) return;
    let mounted = true;
    // 根據已儲存的進度，預估初始已觀看秒數
    // 這樣回訪學生不用重新累積秒數才能超越舊進度
    watchedSecondsRef.current.clear();
    // （在 loadYouTubeAPI 的 onReady 回調中補充秒數，見下方）
    loadYouTubeAPI().then(YT => {
      if (!mounted) return;
      playerRef.current = new YT.Player(containerRef.current, {
        videoId: lesson.videoId,
        playerVars: { rel: 0, modestbranding: 1, cc_load_policy: 0, hl: 'zh-TW' },
        events: {
          onReady: () => {
            if (!mounted) return;
            setVideoReady(true);
            // 根據已儲存的 maxWatchPct，預填已看秒數讓後續累積不從零開始
            const dur = playerRef.current?.getDuration?.() || 0;
            if (dur > 0 && initialProgress?.watchPct > 0) {
              const prefilledSeconds = Math.floor((initialProgress.watchPct / 100) * dur);
              for (let s = 0; s < prefilledSeconds; s++) watchedSecondsRef.current.add(s);
            }
          },
          onStateChange: (e) => {
            if (!mounted) return;
            if (e.data === 1) { setIsPlaying(true);  startTracking(YT); }
            else              { setIsPlaying(false); stopTracking(); }
          }
        }
      });
    });
    return () => {
      mounted = false;
      stopTracking();
      if (playerRef.current && playerRef.current.destroy) {
        try { playerRef.current.destroy(); } catch { /* ignore */ }
      }
    };
  }, [lesson.videoId]);

  function startTracking(YT) {
      if (trackTimer.current) clearInterval(trackTimer.current);
      trackTimer.current = setInterval(() => {
        if (!playerRef.current || !playerRef.current.getCurrentTime) return;
        
        // 取得當下秒數與總時長
        const cur  = Math.floor(playerRef.current.getCurrentTime());
        const dur  = playerRef.current.getDuration();
        
        if (dur > 0) {
          // 👇 核心防禦：將當前秒數存入 Set
          watchedSecondsRef.current.add(cur);
          
          // 👇 真實觀看百分比 = Set 的大小 (不重複秒數) / 總秒數
          const actualWatchPct = (watchedSecondsRef.current.size / dur) * 100;
          
          setMaxWatchPct(prev => Math.max(prev, actualWatchPct));
        }
      }, 1000);
    }

  function stopTracking() {
    if (trackTimer.current) { clearInterval(trackTimer.current); trackTimer.current = null; }
  }

  useEffect(() => {
    const prog = {
      watchPct: maxWatchPct, answers, completedAt,
      startedAt: initialProgress?.startedAt || new Date().toISOString()
    };
    onSaveProgress(lesson.id, prog);
  }, [maxWatchPct, completedAt, answers]);  // ← 加入 answers

  async function handleSubmit() {
    if (!allAnswered) { toast('請先回答所有題目', 'warning'); return; }
    setSubmitLoading(true);
    const now = new Date().toISOString();
    const prog = {
      watchPct: maxWatchPct, answers, completedAt: now,
      startedAt: initialProgress?.startedAt || now
    };
    await onSaveProgress(lesson.id, prog);
    setCompletedAt(now);
    setSubmitLoading(false);
    toast('🎉 課題完成！進度已儲存', 'success', 4000);
  }

  function setAnswer(qId, val) {
    setAnswers(prev => ({ ...prev, [qId]: val }));
  }

  useEffect(() => {
    const handleVisibilityChange = () => {
      if (document.hidden && playerRef.current && playerRef.current.getPlayerState) {
        if (playerRef.current.getPlayerState() === 1) {
          playerRef.current.pauseVideo();
          toast("影片已暫停！請保持在當前畫面上課喔👀", "warning", 5000);
        }
      }
    };

    document.addEventListener('visibilitychange', handleVisibilityChange);
    return () => {
      document.removeEventListener('visibilitychange', handleVisibilityChange);
    };
  }, [toast]);

  return (
    <div className="w-full max-w-2xl landscape:max-w-5xl">
      <div className="glass-panel rounded-2xl shadow-xl overflow-hidden">

        <div className="flex items-center gap-3 p-4 border-b border-gray-100 dark:border-gray-700 bg-gradient-to-r from-indigo-50 to-purple-50 dark:from-indigo-900/30 dark:to-purple-900/30">
          <button onClick={onBack}
            className="w-9 h-9 rounded-full bg-white dark:bg-gray-700 shadow flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors flex-shrink-0">
            <i className="fas fa-arrow-left"></i>
          </button>
          <div className="flex-1 min-w-0">
            <span className="text-xs text-indigo-500 dark:text-indigo-400 font-bold">{lesson.topic}</span>
            <h2 className="font-bold text-gray-800 dark:text-gray-100 truncate text-sm md:text-base">
              {lesson.title}
            </h2>
          </div>
          {completedAt && (
            <span className="flex-shrink-0 text-xs bg-green-100 dark:bg-green-900/50 text-green-700 dark:text-green-300 px-2 py-1 rounded-full font-bold">
              <i className="fas fa-check-circle mr-1"></i>已完成
            </span>
          )}
        </div>

        <div className="overflow-y-auto custom-scrollbar max-h-[calc(92vh-64px)] p-4 md:p-6">

          {/* 影片區域 */}
          <div className="mb-4">
            <div className="relative rounded-xl overflow-hidden shadow-lg bg-black aspect-video">
              {hasVideo ? (
                <div ref={containerRef} className="w-full h-full" />
              ) : (
                <div className="video-placeholder absolute inset-0 flex flex-col items-center justify-center gap-3">
                  <div className="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-lg text-center max-w-xs border-2 border-dashed border-gray-300 dark:border-gray-600">
                    <i className="fab fa-youtube text-5xl text-red-500 mb-3"></i>
                    <p className="font-bold text-gray-700 dark:text-gray-200 text-sm">影片尚未設定</p>
                    <p className="text-xs text-gray-400 dark:text-gray-500 mt-1">
                      請在 Google Sheet 的 <code className="bg-gray-100 dark:bg-gray-700 px-1 py-0.5 rounded">Lessons</code> 工作表填入 <code className="bg-gray-100 dark:bg-gray-700 px-1 py-0.5 rounded">videoId</code>
                    </p>
                  </div>
                </div>
              )}
            </div>

            <div className="mt-2 flex items-center gap-2">
              <div className="flex-1 h-2 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
                <div className={`h-full rounded-full transition-all duration-700 ${watchPctBg(maxWatchPct)}`}
                     style={{ width: fmtPct(maxWatchPct) }} />
              </div>
              <span className={`text-xs font-bold flex-shrink-0 ${watchPctColor(maxWatchPct)}`}>
                {fmtPct(maxWatchPct)}
              </span>
              <span className="text-xs text-gray-400 dark:text-gray-500 flex-shrink-0">已觀看</span>
            </div>

            {!questionsUnlocked && (
              <div className="mt-2 text-xs text-amber-600 dark:text-amber-400 bg-amber-50 dark:bg-amber-900/30 border border-amber-200 dark:border-amber-700 rounded-lg p-2 flex items-center gap-2">
                <i className="fas fa-lock"></i>
                <span>請先觀看至少 <strong>{CONFIG.VIDEO_UNLOCK_THRESHOLD}%</strong> 的影片，即可解鎖答題。（目前：{fmtPct(maxWatchPct)}）</span>
              </div>
            )}
            {questionsUnlocked && !completedAt && (
              <div className="mt-2 text-xs text-green-600 dark:text-green-400 bg-green-50 dark:bg-green-900/30 border border-green-200 dark:border-green-700 rounded-lg p-2 flex items-center gap-2">
                <i className="fas fa-unlock"></i>
                <span>影片觀看達標！題目已解鎖，請完成以下問題。</span>
              </div>
            )}
          </div>

          {/* 題目區域 */}
          <div className="relative">
            {!questionsUnlocked && (
              <div className="question-lock-overlay absolute inset-0 z-10 rounded-xl bg-white/70 dark:bg-gray-900/70 flex flex-col items-center justify-center gap-3">
                <i className="fas fa-lock text-4xl text-gray-400 dark:text-gray-500"></i>
                <p className="text-sm font-bold text-gray-500 dark:text-gray-400">
                  觀看影片達 {CONFIG.VIDEO_UNLOCK_THRESHOLD}% 後解鎖題目
                </p>
              </div>
            )}

            {totalQ === 0 ? (
               <div className="py-8 text-center text-gray-400 dark:text-gray-500 border-2 border-dashed border-gray-200 dark:border-gray-700 rounded-xl">
                <i className="fas fa-question-circle text-3xl mb-2 opacity-40"></i>
                <p className="text-sm font-bold">本課題無問答題目</p>
                <p className="text-xs mt-1 text-gray-400">觀看達 {CONFIG.VIDEO_COMPLETE_THRESHOLD}% 後即可完成課題</p>
                {!completedAt && allAnswered && (
                  <button onClick={handleSubmit} disabled={submitLoading}
                    className="mt-3 px-6 py-2 bg-gradient-to-r from-green-500 to-emerald-500 text-white rounded-xl font-bold text-sm shadow hover:scale-[1.02] transition-all">
                    {submitLoading ? <><i className="fas fa-spinner fa-spin mr-1"></i>儲存中...</> : <><i className="fas fa-paper-plane mr-1"></i>標記為已完成</>}
                  </button>
                )}
              </div>
            ) : (
              <div className="space-y-4">
                <h3 className="font-bold text-gray-700 dark:text-gray-200 flex items-center gap-2 text-sm">
                  <i className="fas fa-clipboard-question text-indigo-500"></i>
                  課題問題（{answered}/{totalQ} 已作答）
                </h3>

                {lesson.questions.map((q, idx) => (
                  <QuestionItem
                    key={q.id}
                    question={q}
                    index={idx}
                    answer={answers[q.id]}
                    onAnswer={(val) => setAnswer(q.id, val)}
                    disabled={!!completedAt}
                  />
                ))}

                {!completedAt && (
                  <button onClick={handleSubmit}
                    disabled={!allAnswered || submitLoading}
                    className={`w-full py-3 px-6 rounded-xl font-bold shadow-lg transition-all flex items-center justify-center gap-2 mt-2 ${
                      allAnswered
                        ? 'bg-gradient-to-r from-green-500 to-emerald-500 hover:from-green-600 hover:to-emerald-600 text-white hover:scale-[1.02]'
                        : 'bg-gray-200 dark:bg-gray-700 text-gray-400 dark:text-gray-500 cursor-not-allowed'
                    }`}>
                    {submitLoading
                      ? <><i className="fas fa-spinner fa-spin"></i>儲存中...</>
                      : allAnswered
                        ? <><i className="fas fa-paper-plane"></i>提交答案</>
                        : <><i className="fas fa-pen"></i>請完成所有題目（{answered}/{totalQ}）</>}
                  </button>
                )}

                {completedAt && (
                  <div className="p-4 bg-green-50 dark:bg-green-900/30 border border-green-200 dark:border-green-700 rounded-xl text-center">
                    <i className="fas fa-trophy text-3xl text-yellow-500 mb-2"></i>
                    <p className="font-bold text-green-700 dark:text-green-300">課題已完成！</p>
                    <p className="text-xs text-green-600 dark:text-green-400 mt-1">
                      完成時間：{new Date(completedAt).toLocaleString('zh-HK')}
                    </p>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── 單道題目渲染元件 ── */
function QuestionItem({ question, index, answer, onAnswer, disabled }) {
  return (
    <div className="bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-xl p-4 shadow-sm">
      <p className="text-sm font-bold text-gray-700 dark:text-gray-200 mb-3">
        <span className="inline-flex items-center justify-center w-6 h-6 rounded-full bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400 text-xs font-bold mr-2 flex-shrink-0">
          {index + 1}
        </span>
        {question.text}
      </p>

      {question.type === 'mcq' && Array.isArray(question.options) && (
        <div className="grid grid-cols-1 gap-2">
          {question.options.map((opt, oi) => {
            const selected  = answer === String(oi);
            const isCorrect = disabled && oi === question.answer;
            const isWrong   = disabled && selected && oi !== question.answer;
            return (
              <button key={oi} onClick={() => !disabled && onAnswer(String(oi))}
                className={`text-left px-4 py-2.5 rounded-lg border-2 text-sm transition-all font-medium ${
                  disabled
                    ? isCorrect ? 'border-green-400 bg-green-50 dark:bg-green-900/30 text-green-700 dark:text-green-300'
                      : isWrong  ? 'border-red-400 bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400'
                      : 'border-gray-200 dark:border-gray-600 text-gray-500 dark:text-gray-400 opacity-60'
                    : selected
                      ? 'border-indigo-500 bg-indigo-50 dark:bg-indigo-900/40 text-indigo-700 dark:text-indigo-300 shadow'
                      : 'border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-200 hover:border-indigo-300 dark:hover:border-indigo-600 hover:bg-indigo-50/50 dark:hover:bg-indigo-900/20'
                }`}>
                <span className="font-bold mr-2">{['A','B','C','D','E'][oi]}.</span>
                {opt}
                {disabled && isCorrect && <i className="fas fa-check ml-2 text-green-500"></i>}
                {disabled && isWrong   && <i className="fas fa-times ml-2 text-red-500"></i>}
              </button>
            );
          })}
        </div>
      )}

      {question.type === 'fill' && (
        <div>
          <input
            type="text"
            value={answer || ''}
            onChange={e => !disabled && onAnswer(e.target.value)}
            disabled={disabled}
            placeholder="請在此輸入答案..."
            className={`w-full px-4 py-2.5 border-2 rounded-lg text-sm focus:outline-none transition-colors ${
              disabled
                ? 'border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-600 dark:text-gray-300 cursor-default'
                : 'border-gray-200 dark:border-gray-600 focus:border-indigo-400 dark:focus:border-indigo-500 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200'
            }`}
          />
          {disabled && answer && (
            <div className="mt-1.5 text-xs text-green-600 dark:text-green-400">
              <i className="fas fa-check-circle mr-1"></i>
              參考答案：{question.answer}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ============================================================================
 * 【區塊 10】STUDENT STATS SCREEN
 * ============================================================================ */
function StudentStatsScreen({ userName, lessons, getProgress, onBack }) {
  const stats = useMemo(() => {
    return lessons.map(l => {
      const p = getProgress(l.id);
      return {
        lesson: l,
        watchPct:    p?.watchPct   || 0,
        answered:    p?.answers ? Object.keys(p.answers).length : 0,
        totalQ:      l.questions?.length || 0,
        completedAt: p?.completedAt || null,
        startedAt:   p?.startedAt  || null,
      };
    });
  }, [lessons, getProgress]);

  const completed  = stats.filter(s => s.completedAt).length;
  const inProgress = stats.filter(s => !s.completedAt && s.watchPct > 0).length;
  const avgWatch   = stats.length > 0
    ? Math.round(stats.reduce((a,s) => a + s.watchPct, 0) / stats.length)
    : 0;

  return (
    <div className="w-full max-w-lg">
      <div className="glass-panel p-4 md:p-6 rounded-2xl shadow-xl max-h-[92vh] overflow-y-auto custom-scrollbar">
        <div className="flex items-center gap-3 mb-5">
          <button onClick={onBack}
            className="w-9 h-9 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
            <i className="fas fa-arrow-left"></i>
          </button>
          <h2 className="text-xl font-bold text-gray-800 dark:text-gray-100">我的學習記錄</h2>
        </div>

        <div className="grid grid-cols-3 gap-3 mb-5">
          {[
            { icon:'✅', label:'已完成',   value: completed,  color:'from-green-500 to-emerald-500' },
            { icon:'▶️', label:'進行中',   value: inProgress, color:'from-blue-500 to-cyan-500' },
            { icon:'📊', label:'平均觀看', value: `${avgWatch}%`, color:'from-indigo-500 to-purple-500' },
          ].map((k,i) => (
            <div key={i} className="bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-xl p-3 text-center">
              <div className="text-xl mb-1">{k.icon}</div>
              <div className={`text-xl font-bold bg-gradient-to-r ${k.color} bg-clip-text text-transparent`}>{k.value}</div>
              <div className="text-xs text-gray-400 dark:text-gray-500">{k.label}</div>
            </div>
          ))}
        </div>

        <div className="space-y-2">
          {stats.map(s => (
            <div key={s.lesson.id}
              className="flex items-center gap-3 bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-xl p-3">
              <ProgressRing pct={s.watchPct} size={44} strokeWidth={4} />
              <div className="flex-1 min-w-0">
                <p className="text-sm font-bold text-gray-700 dark:text-gray-200 truncate">{s.lesson.title}</p>
                <div className="flex items-center gap-2 text-xs text-gray-400 dark:text-gray-500 mt-0.5">
                  <span>觀看 {fmtPct(s.watchPct)}</span>
                  {s.totalQ > 0 && <span>· 題目 {s.answered}/{s.totalQ}</span>}
                  {s.completedAt && <span className="text-green-500 dark:text-green-400 font-bold">· 已完成</span>}
                </div>
              </div>
              <LessonStatusBadge status={
                s.completedAt ? 'completed'
                : s.answered > 0 ? 'answering'
                : s.watchPct > 0 ? 'watching'
                : 'not_started'
              } />
            </div>
          ))}
        </div>

        {stats.length === 0 && (
          <EmptyState icon="📚" title="尚無學習記錄" subtitle="完成課題後這裡將顯示你的進度統計" />
        )}
      </div>
    </div>
  );
}

/* ============================================================================
 * 【區塊 11】TEACHER DASHBOARD SCREEN
 * ============================================================================ */
function TeacherDashboardScreen({ lessons, allProgress, onBack, onViewLessonReport, onRefresh, loading }) {
  const lessonStats = useMemo(() => {
    return lessons.map(lesson => {
      const progressMap = allProgress?.[lesson.id] || {};
      const students    = Object.entries(progressMap);
      const started     = students.length;
      const completed   = students.filter(([,p]) => p.completedAt).length;
      const avgWatch    = started > 0
        ? Math.round(students.reduce((a,[,p]) => a + (p.watchPct||0), 0) / started)
        : 0;
      return { lesson, started, completed, avgWatch, progressMap };
    });
  }, [lessons, allProgress]);

  const totalStudents = useMemo(() => {
    const names = new Set();
    Object.values(allProgress || {}).forEach(lp =>
      Object.keys(lp).forEach(n => names.add(n))
    );
    return names.size;
  }, [allProgress]);

  const totalCompleted = lessonStats.reduce((a,s) => a + s.completed, 0);

  return (
    <div className="w-full max-w-3xl">
      <div className="glass-panel p-4 md:p-6 rounded-2xl shadow-xl max-h-[92vh] overflow-y-auto custom-scrollbar">

        <div className="flex items-center gap-3 mb-5">
          <button onClick={onBack}
            className="w-9 h-9 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
            <i className="fas fa-arrow-left"></i>
          </button>
          <div className="flex-1">
            <h2 className="text-xl font-bold text-gray-800 dark:text-gray-100">
              <i className="fas fa-chalkboard-teacher text-amber-500 mr-2"></i>教師儀表板
            </h2>
            <p className="text-xs text-gray-400 dark:text-gray-500">查看全班的影片觀看進度與答題情況</p>
          </div>
          <button onClick={onRefresh}
            className="w-9 h-9 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors"
            title="重新整理">
            <i className={`fas fa-rotate-right ${loading ? 'fa-spin' : ''}`}></i>
          </button>
        </div>

        <div className="grid grid-cols-3 gap-3 mb-5">
          {[
            { icon:'📹', label:'課題總數', value: lessons.length,  color:'from-indigo-500 to-purple-500' },
            { icon:'👥', label:'參與學生', value: totalStudents,   color:'from-blue-500 to-cyan-500' },
            { icon:'✅', label:'完成人次', value: totalCompleted,  color:'from-green-500 to-emerald-500' },
          ].map((k,i) => (
            <div key={i} className="bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-xl p-3 text-center">
              <div className="text-xl mb-1">{k.icon}</div>
              <div className={`text-2xl font-bold bg-gradient-to-r ${k.color} bg-clip-text text-transparent`}>{k.value}</div>
              <div className="text-xs text-gray-400 dark:text-gray-500">{k.label}</div>
            </div>
          ))}
        </div>

        {lessons.length === 0 ? (
          <EmptyState icon="📹" title="尚未設定任何課題" subtitle="請在 Google Sheet 的 Lessons 工作表中新增課題。" />
        ) : (
          <div className="space-y-3">
            <h3 className="text-sm font-bold text-gray-600 dark:text-gray-300 flex items-center gap-2">
              <i className="fas fa-list-check text-indigo-500"></i>各課題完成情況
            </h3>
            {lessonStats.map(s => (
              <button key={s.lesson.id}
                onClick={() => onViewLessonReport(s.lesson)}
                className="w-full text-left bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-xl p-4 hover:shadow-md hover:border-indigo-200 dark:hover:border-indigo-700 transition-all hover:scale-[1.01]">
                <div className="flex items-start gap-3">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap mb-1">
                      <span className="text-xs bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-300 px-2 py-0.5 rounded-full font-bold">
                        {s.lesson.topic}
                      </span>
                      {s.lesson.dueDate && (
                        <span className={`text-xs px-2 py-0.5 rounded-full font-bold ${
                          isOverdue(s.lesson.dueDate)
                            ? 'bg-red-100 dark:bg-red-900/50 text-red-600 dark:text-red-300'
                            : 'bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400'
                        }`}>
                          截止 {s.lesson.dueDate}
                        </span>
                      )}
                    </div>
                    <p className="font-bold text-gray-800 dark:text-gray-100 truncate">{s.lesson.title}</p>

                    <div className="mt-2 flex items-center gap-2">
                      <div className="flex-1 h-2 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
                        {s.started > 0 && (
                          <div className="h-full bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full transition-all duration-700"
                               style={{ width: `${(s.completed / Math.max(s.started,1)) * 100}%` }} />
                        )}
                      </div>
                      <span className="text-xs text-gray-500 dark:text-gray-400 flex-shrink-0">
                        {s.started > 0 ? `${s.completed}/${s.started} 人完成` : '尚無人觀看'}
                      </span>
                    </div>

                    {s.started > 0 && (
                      <div className="mt-1 text-xs text-gray-400 dark:text-gray-500">
                        平均觀看 <span className={`font-bold ${watchPctColor(s.avgWatch)}`}>{fmtPct(s.avgWatch)}</span>
                        · {s.started} 人已開始
                      </div>
                    )}
                  </div>
                  <i className="fas fa-chevron-right text-gray-300 dark:text-gray-600 mt-1 flex-shrink-0"></i>
                </div>
              </button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ============================================================================
 * 【區塊 12】TEACHER LESSON REPORT SCREEN
 * ============================================================================ */
function TeacherLessonReportScreen({ lesson, allProgress, onBack }) {
  const [expandedStudent, setExpandedStudent] = useState(null);
  const [showTab, setShowTab] = useState('started'); // 'started' | 'not_started'

  const progressMap = allProgress?.[lesson.id] || {};
  const studentList = Object.entries(progressMap)
    .map(([name, p]) => ({ name, ...p }))
    .sort((a,b) => (b.watchPct||0) - (a.watchPct||0));

  // 推算同班未開始學生
  const notStartedStudents = useMemo(() => {
    const allKnown = new Set();
    Object.values(allProgress || {}).forEach(lp => Object.keys(lp).forEach(n => allKnown.add(n)));
    return [...allKnown]
      .filter(name => matchesTargetForm(lesson.targetForm, parseUserForm(name)))
      .filter(name => !progressMap[name]);
  }, [allProgress, lesson.targetForm, progressMap]);

  const totalQ     = lesson.questions?.length || 0;
  const avgWatch   = studentList.length > 0
    ? Math.round(studentList.reduce((a,s) => a + (s.watchPct||0), 0) / studentList.length)
    : 0;
  const completedCount = studentList.filter(s => s.completedAt).length;

  return (
    <div className="w-full max-w-4xl">
      <div className="glass-panel p-4 md:p-6 rounded-2xl shadow-xl max-h-[92vh] overflow-y-auto custom-scrollbar">

        <div className="flex items-center gap-3 mb-5">
          <button onClick={onBack}
            className="w-9 h-9 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
            <i className="fas fa-arrow-left"></i>
          </button>
          <div className="flex-1 min-w-0">
            <span className="text-xs text-amber-500 font-bold">課題報告</span>
            <h2 className="font-bold text-gray-800 dark:text-gray-100 truncate">{lesson.title}</h2>
          </div>
        </div>

        <div className="grid grid-cols-4 gap-2 mb-5">
          {[
            { icon:'▶️', label:'已點開',   value: studentList.length, color:'from-blue-500 to-cyan-500' },
            { icon:'✅', label:'已完成',   value: completedCount,     color:'from-green-500 to-emerald-500' },
            { icon:'📊', label:'平均觀看', value: fmtPct(avgWatch),   color:'from-indigo-500 to-purple-500' },
            { icon:'😴', label:'未點開',   value: notStartedStudents.length, color:'from-red-400 to-rose-500' },
          ].map((k,i) => (
            <div key={i} className="bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-xl p-2.5 text-center">
              <div className="text-lg mb-0.5">{k.icon}</div>
              <div className={`text-xl font-bold bg-gradient-to-r ${k.color} bg-clip-text text-transparent`}>{k.value}</div>
              <div className="text-[10px] text-gray-400 dark:text-gray-500">{k.label}</div>
            </div>
          ))}
        </div>

        {/* Tab 切換 */}
        <div className="flex bg-gray-100 dark:bg-gray-700 p-1 rounded-xl mb-4">
          <button onClick={() => setShowTab('started')}
            className={`flex-1 py-1.5 text-xs font-bold rounded-lg transition-all ${showTab === 'started' ? 'bg-white dark:bg-gray-600 text-blue-600 dark:text-blue-300 shadow-sm' : 'text-gray-500 dark:text-gray-400'}`}>
            <i className="fas fa-play-circle mr-1"></i>已點開 ({studentList.length})
          </button>
          <button onClick={() => setShowTab('not_started')}
            className={`flex-1 py-1.5 text-xs font-bold rounded-lg transition-all ${showTab === 'not_started' ? 'bg-white dark:bg-gray-600 text-red-500 dark:text-red-400 shadow-sm' : 'text-gray-500 dark:text-gray-400'}`}>
            <i className="fas fa-eye-slash mr-1"></i>未點開 ({notStartedStudents.length})
          </button>
        </div>

        {showTab === 'started' ? (
          studentList.length === 0 ? (
            <EmptyState icon="▶️" title="尚無學生點開此課題" subtitle="學生開始觀看後，這裡將顯示詳細的進度報告。" />

          <div className="space-y-2">
            <h3 className="text-sm font-bold text-gray-600 dark:text-gray-300 flex items-center gap-2">
              <i className="fas fa-users text-indigo-500"></i>學生進度（按觀看%排序）
            </h3>

            <div className="grid text-xs font-bold text-gray-400 dark:text-gray-500 px-4 py-2"

              <span className="text-center">影片觀看</span>
              <span className="text-center">答題</span>
              <span className="text-center">狀態</span>

            </div>

            {studentList.map(s => {
              const answered   = s.answers ? Object.keys(s.answers).length : 0;
              const isExpanded = expandedStudent === s.name;

                <div key={s.name} className="bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-xl overflow-hidden transition-all">

                    <div className="flex justify-center">

                        : s.watchPct > 0 ? 'watching'

                    </div>

                    <button onClick={() => setExpandedStudent(isExpanded ? null : s.name)}
                      className="flex items-center justify-center text-gray-400 dark:text-gray-500 hover:text-indigo-500 dark:hover:text-indigo-400 transition-colors">
                      <i className={`fas fa-chevron-${isExpanded ? 'up' : 'down'} text-xs`}></i>
                    </button>
                  </div>

                  {isExpanded && (
                    <div className="px-4 pb-3 pt-0 border-t border-gray-50 dark:border-gray-700/50">

                        <div className="mt-2 space-y-1.5">

                            const ans     = s.answers?.[q.id];
                            const correct = q.type === 'mcq'
                              ? ans === String(q.answer)
                              : ans?.toLowerCase().trim() === q.answer?.toLowerCase().trim();
                            return (
                              <div key={q.id} className="flex items-start gap-2 text-xs">
                                <span className="font-bold text-gray-400 dark:text-gray-500 flex-shrink-0 w-6 text-right">Q{qi+1}</span>
                                <span className="text-gray-500 dark:text-gray-400 flex-1 min-w-0 truncate" title={q.text}>{q.text}</span>

                                      ? 'bg-green-100 dark:bg-green-900/50 text-green-700 dark:text-green-300'
                                      : 'bg-red-100 dark:bg-red-900/50 text-red-600 dark:text-red-300'
                                  }`}>
                                    {q.type === 'mcq' ? `選 ${['A','B','C','D'][parseInt(ans)]}` : ans}
                                    <i className={`fas ${correct ? 'fa-check' : 'fa-times'} ml-1`}></i>
                                  </span>
                                ) : (
                                  <span className="flex-shrink-0 px-2 py-0.5 rounded bg-gray-100 dark:bg-gray-700 text-gray-400 dark:text-gray-500">

                  )}

              );
            })}
          </div>

        ) : (
          /* 未點開學生 */
          notStartedStudents.length === 0 ? (
            <EmptyState icon="🎉" title="所有已登記學生均已點開！" subtitle="系統只追蹤曾使用過此平台的學生。" />
          ) : (
            <div className="space-y-2">
              <h3 className="text-sm font-bold text-gray-600 dark:text-gray-300 flex items-center gap-2">
                <i className="fas fa-eye-slash text-red-400"></i>尚未點開此課題 ({notStartedStudents.length} 人)
              </h3>
              <p className="text-xs text-gray-400 dark:text-gray-500 italic bg-amber-50 dark:bg-amber-900/20 px-3 py-2 rounded-lg border border-amber-100 dark:border-amber-800/30">

                以下學生曾登入過系統，但尚未開始此課題。未曾登入的學生不顯示於此。

  );

/* ============================================================================
 * 【區塊 13】MAIN APP
 * ============================================================================ */
function FlippedClassroomApp() {
  const [userName, setUserName] = useState(() => localStorage.getItem(CONFIG.STORAGE.username) || '');
  const [isGuest, setIsGuest]   = useState(false);
  const [isDark, setIsDark]     = useState(() => localStorage.getItem(CONFIG.STORAGE.darkMode) === 'true');

  const [screen, setScreen] = useState('home');
  const [activelesson, setActiveLesson] = useState(null);

  /* ── ★ 課題資料從 GAS 動態載入 ── */
  const { lessons, loading: lessonsLoading, error: lessonsError, refetchLessons } = useLessons();

  /* ── 進度資料 ── */
  const { allProgress, loading, error, submitProgress, getProgress, refetch } =
    useProgressData(userName);

  useEffect(() => {
    document.documentElement.classList.toggle('dark', isDark);
    localStorage.setItem(CONFIG.STORAGE.darkMode, isDark);
  }, [isDark]);

  useEffect(() => {
    if (!userName) {
      localStorage.removeItem(CONFIG.STORAGE.username);
      setIsGuest(false);
      setScreen('home');
    } else {
      localStorage.setItem(CONFIG.STORAGE.username, userName);
    }
  }, [userName]);

  useEffect(() => {
    window.__APP_STATE__ = { gameState: screen };
    window.dispatchEvent(new Event('app-state-changed'));
  }, [screen]);

  function handleOpenLesson(lesson) {
    setActiveLesson(lesson);
    setScreen('lesson');
  }

  async function handleSaveProgress(lessonId, progressObj) {
    await submitProgress(lessonId, progressObj);
  }

  const toast = useToast();
  useEffect(() => {
    if (error) toast(`進度資料載入錯誤: ${error}`, 'error');
  }, [error]);

  return (
    <div className={`min-h-screen transition-colors ${isDark ? 'dark bg-gray-900' : 'bg-gradient-to-br from-indigo-50 via-purple-50/30 to-blue-50'} flex items-start justify-center p-3 md:p-6 pt-4`}>

      <button onClick={() => setIsDark(d => !d)}
        className="fixed top-4 right-4 z-[999] w-10 h-10 rounded-full bg-white dark:bg-gray-800 shadow-lg border border-gray-200 dark:border-gray-700 text-gray-600 dark:text-yellow-400 flex items-center justify-center transition-all hover:scale-110">
        {isDark ? <i className="fas fa-sun text-lg"></i> : <i className="fas fa-moon text-lg"></i>}
      </button>

      <AnimatePresence mode="wait">

        {screen === 'home' && (
          <motion.div key="home" initial={{opacity:0,y:20}} animate={{opacity:1,y:0}} exit={{opacity:0,y:-20}}
            className="w-full flex justify-center">
            <HomeScreen
                userName={userName} setUserName={setUserName}
                isGuest={isGuest} setIsGuest={setIsGuest}
                lessons={lessons} lessonsLoading={lessonsLoading} lessonsError={lessonsError}
                refetchLessons={refetchLessons} getProgress={getProgress}
                isDark={isDark} onOpenLesson={handleOpenLesson}
                onOpenTeacher={() => setScreen('teacher_dashboard')}
                onOpenAdmin={() => setScreen('assignment_admin')}
                onShowStudentStats={() => setScreen('student_stats')}
              />
          </motion.div>
        )}

        {screen === 'lesson' && activelesson && (
          <motion.div key="lesson" initial={{opacity:0,x:50}} animate={{opacity:1,x:0}} exit={{opacity:0,x:-50}}
            className="w-full flex justify-center">
            <LessonPlayerScreen
              lesson={activelesson}
              userName={userName}
              initialProgress={getProgress(activelesson.id)}
              onSaveProgress={handleSaveProgress}
              onBack={() => setScreen('home')}
            />
          </motion.div>
        )}

        {screen === 'student_stats' && (
          <motion.div key="student_stats" initial={{opacity:0,x:50}} animate={{opacity:1,x:0}} exit={{opacity:0,x:-50}}
            className="w-full flex justify-center">
            <StudentStatsScreen
              userName={userName}
              lessons={lessons}
              getProgress={(lid) => getProgress(lid)}
              onBack={() => setScreen('home')}
            />
          </motion.div>
        )}

        {screen === 'teacher_dashboard' && (
          <motion.div key="tdash" initial={{opacity:0,x:50}} animate={{opacity:1,x:0}} exit={{opacity:0,x:-50}}
            className="w-full flex justify-center">
            {isTeacher(userName) ? (
              <TeacherDashboardScreen
                lessons={lessons}
                allProgress={allProgress}
                loading={loading}
                onBack={() => setScreen('home')}
                onRefresh={refetch}
                onViewLessonReport={(lesson) => { setActiveLesson(lesson); setScreen('teacher_lesson_report'); }}
              />
            ) : (
              <div className="glass-panel p-8 rounded-2xl shadow-xl text-center max-w-sm">
                <i className="fas fa-lock text-4xl text-red-500 mb-4"></i>
                <h2 className="text-xl font-bold text-gray-800 dark:text-gray-100 mb-2">權限不足</h2>
                <p className="text-gray-500 dark:text-gray-400 mb-4 text-sm">此頁面僅限教師使用。</p>

                  返回主頁

            )}

        {screen === 'teacher_lesson_report' && activelesson && (
          <motion.div key="treport" initial={{opacity:0,x:50}} animate={{opacity:1,x:0}} exit={{opacity:0,x:-50}}

            ) : (
              <div className="glass-panel p-8 rounded-2xl shadow-xl text-center max-w-sm">
                <i className="fas fa-lock text-4xl text-red-500 mb-4"></i>
                <button onClick={() => setScreen('home')} className="bg-gray-600 text-white px-6 py-2 rounded-lg">返回</button>
              </div>

        )}

        {screen === 'assignment_admin' && (
          <motion.div key="aadmin" initial={{opacity:0,x:50}} animate={{opacity:1,x:0}} exit={{opacity:0,x:-50}}
